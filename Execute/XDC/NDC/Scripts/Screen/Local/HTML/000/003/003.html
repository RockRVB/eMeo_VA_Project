<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Home</title>
    <link rel="stylesheet" href="../../../../../../../../Resource/Common/HTML/css/VA/style.css">
    <script src="../../../../../../../../Resource/Common/HTML/js/coreScript.js"></script>
    <script src="common.js"></script>
    <script src="../../../../../../../../Resource/Common/HTML/js/VA/jquery-3.3.1.min.js"></script>
	
</head>
<body>
    <div class="stm-layout">
        <!-- Header -->

        <stm-header></stm-header>

        <!-- Body -->
        <main class="stm-body">
            <div class="stm-content">
                
                <!-- Insert Card Banner -->
                <div class="insert-card-wrapper">
                    <div class="insert-card-inner">
                        <p ids="ids_VAB_pls_insert_card">Please insert your card.</p>
                    </div>
                </div>

                <!-- Call to action -->
                <h2  ids="ids_VAB_home_title" class="stm-subtitle">Quý khách vui lòng chọn 01 giao dịch bên dưới</h2>

                <!-- Cards Grid -->
                <div class="stm-cards-grid">
                    <div class="stm-cards-row">
                        <!-- Card 1 -->
                        <div class="stm-card" id="mo-tai-khoan" type="button" tag="OnOpenAccount">
                            <stm-card
                                    icon-url="../../../../../../../../Resource/Common/HTML/images/VA/icon-open-account.png"
                                    title="Mở tài khoản"
                                    ids="ids_VAB_open_account"
                                    id="mo-tai-khoan"
                            >
                            </stm-card>
                        </div>
                        <!-- Card 2 -->
                        <div class="stm-card" id="nop-tien" type="button" tag="OnDeposit">
                            <stm-card
                                    icon-url="../../../../../../../../Resource/Common/HTML/images/VA/icon-money.png"
                                    title="Nộp tiền"
                                    ids="ids_VAB_deposit"
                            >
                            </stm-card>
                        </div>
                        <!-- Card 3 -->
                        <div class="stm-card" id="rut-tien" type="button" tag="OnWithdraw">
                            <stm-card
                                    icon-url="../../../../../../../../Resource/Common/HTML/images/VA/icon-withdraw.png"
                                    title="Rút tiền"
                                    ids="ids_VAB_withdraw"
                            >
                            </stm-card>
                        </div>
                        <!-- Card 4 -->
                        <div class="stm-card" id="chuyen-khoan" type="button" tag="OnTransfer">
                            <stm-card
                                    icon-url="../../../../../../../../Resource/Common/HTML/images/VA/icon-transfer.png"
                                    title="Chuyển khoản"
                                    ids="ids_VAB_transfer"
                            >
                            </stm-card>
                        </div>
                    </div>

                    <div class="stm-cards-row">
                        <!-- Card 5 -->
                        <div class="stm-card" id="tktk" type="button" tag="OnSavingsAccount">
                            <stm-card
                                    icon-url="../../../../../../../../Resource/Common/HTML/images/VA/icon-savings.png"
                                    title="Tài khoản tiết kiệm"
                                    ids="ids_VAB_tktk"
                            >
                            </stm-card>
                        </div>
                        <!-- Card 6 -->
                        <div class="stm-card" id="dk-vay" type="button" tag="OnRegisLoan">
                            <stm-card
                                    icon-url="../../../../../../../../Resource/Common/HTML/images/VA/icon-loan.png"
                                    title="Đăng ký vay"
                                    ids="ids_VAB_dang_ky_vay"
                            >
                            </stm-card>
                        </div>
                        <!-- Card 7 -->
                            <div class="stm-card" id="dk-ph-the" type="button" tag="OnRegisCCI">
                            <stm-card
                                    icon-url="../../../../../../../../Resource/Common/HTML/images/VA/icon-card.png"
                                    title="Đăng ký phát hành thẻ"
                                    ids="ids_VAB_card_publish"
                            >
                            </stm-card>
                        </div>
                        <!-- Card 8 -->
                        <div class="stm-card" id="dich-vu-khac" type="button" tag="OnPayingBill">
                            <stm-card
                                    icon-url="../../../../../../../../Resource/Common/HTML/images/VA/icon-other.png"
                                    title="Dịch vụ khác"
                                    ids="ids_VAB_other_service"
                            >
                            </stm-card>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <stm-footer></stm-footer>
        <stm-one-btn-dialog id="feature-not-avail"></stm-one-btn-dialog>
        <input style="display: none;" id="input_val" value='{Replace input_val}' />
        <input style="display: none;" id="output_val" content='{Binding output_val mode=2}'/>
    </div>
</body>
<script src="../../../../../../../../Resource/Common/HTML/js/VA/scale.js"></script>
<script>
    $(document).ready(function() {
        const notAvail = document.getElementById("feature-not-avail");
        const developing = document.getElementById("dich-vu-khac");
        let timer = null

        notAvail.titleText = `Tính năng đang phát triển`;
        notAvail.btnTitle = 'Đóng';
        notAvail.isBtnPrimary = true
        notAvail.idsTitle = 'ids_VAB_feature_not_avail';
        notAvail.onPrimaryClick = function() {
            notAvail.openDialog = false;
            if(timer != null) {
                clearInterval(timer)
            }
        };

        developing.addEventListener('click', () => {
            notAvail.openDialog = true;

            let timeLeft = 5;
            // const data = $('#input_val').val();

            notAvail.subTitle = `<span ids="ids_VAB_return_home_after_seconds">Tự động về màn hình trang chủ trong </span>${timeLeft}s`
             timer = setInterval(() => {
                timeLeft--;

                if(notAvail._isOpen) notAvail.subTitle = `Tự động về màn hình trang chủ trong ${timeLeft}s` ;

                if (timeLeft <= 0) {
                    notAvail.openDialog = false;
                    clearInterval(timer);
                }
            }, 1000);
        })


    })
</script>
</html>
