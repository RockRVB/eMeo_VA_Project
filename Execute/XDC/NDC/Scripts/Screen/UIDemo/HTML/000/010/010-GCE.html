<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
    <title>首页</title>
    <script src="../../js/vue.min.js"></script>
    <script src="../../js/grg-ui.min.js"></script>
    <script src="../../js/swiper4.min.js"></script>
    <script src="../../js/ibank.js"></script>
    <link rel="stylesheet" href="../../css/ibank.css">
    <link rel="stylesheet" href="../../css/grg-ui.min.css">
    <link rel="stylesheet" href="../../css/swiper4.min.css">
    <link rel="stylesheet" href="../../css/animate.grg.css">
</head>
<style>
    .bg {
        display: flex;
        width: 100%;
        height: 100vh;
        font-family: "Alibaba Sans";
    }

    .mask {
        position: absolute;
        z-index: 0;
        background: url("../../images/img_2.4/bg-business.png") no-repeat center center/100% 100%;
        width: 100%;
        height: 100%;
    }

    .title {
        position: absolute;
        top: 196px;
        z-index: 5;
        width: 100%;
        height: 62px;
        font-size: 40px;
        font-weight: bold;
        color: #333333;
        line-height: 62px;
        text-align: center;
    }

    .bg-left {
        display: flex;
        flex-direction: column;
        background: #F7FAFF;
        width: 60%;
        height: inherit;
    }

    .left-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        /* background: #F7FAFF; */
        height: inherit;
        z-index: 3;
		margin-top: 0%;
    }

    .logo {
        z-index: 1;
        margin: 76px 0 0px 50px;
        width: 208px;
        height: 78px;
    }

    .tip-text {
        margin-top: 203px;
        z-index: 1;
        height: 56px;
        font-size: 36px;
        font-weight: 500;
        color: #296CFF;
        line-height: 56px;
        font-family: "AlibabaSans-Medium";
        text-align: center;
    }

    .hand-click-btn-box {
        position: relative;
        width: 408px;
        height: 108px;
        padding: 2px;
        background-image: linear-gradient(180deg, rgba(255, 255, 255, 0.7), rgba(0, 66, 214, 1));
        box-shadow: 0px 2px 10px 0px rgba(0,37,96,0.49);
        border-radius: 20px;
        box-sizing: border-box;
        margin-top: 150px;
    }

    .hand-click-btn-box .btn-box {
        width: 100%;
        height: 100%;
        line-height: 100px;
        text-align: center;
        font-weight: 500;
        background: linear-gradient(180deg, #7AA4FF 0%, #296CFF 100%);
        border-radius: 20px;
    }

    .hand-click-btn-box .hand-click-img {
        position: absolute;
        left: 50%;
        bottom: -130px;
        transform: translateX(-50%);
    }

    .bg-right {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        width: 40%;
        background: #F7FAFF;
        height: inherit;
    }

    .right-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
    }

    .gradient {
        position: absolute;
        z-index: 0;
        bottom: 0;
        height: 625px;
        width: 40%;
        background: linear-gradient(180deg, #F5F9FF 0%, #ABCDFF 100%);
        border-radius: 0px 0px 0px 24px;
    }

    .card-img {
        z-index: 1;
		height: auto;
		margin-top: 70%;
    }

    .insert-text {
        margin-top: 357px;
        margin-bottom: 28px;
        z-index: 1;
        height: 56px;
        line-height: 56px;
        font-size: 36px;
        font-weight: 500;
        color: #296CFF;
        font-family: "AlibabaSans-Medium";
    }

    .switch-btn {
        z-index: 1;
        margin: 75px 70px 89px 0;
        width: 161px;
        height: 57px;
        background: #D2E0FF;
        border-radius: 29px;
    }

    .switch-btn-active {
        z-index: 1;
        width: 90px;
        height: 57px;
        background: #296CFF;
        box-shadow: inset 0px 0px 6px 1px rgba(255, 255, 255, 0.5);
        border-radius: 29px;
        font-size: 32px;
        font-weight: 500;
        color: #FFFFFF;
        line-height: 57px;
        text-align: center;
    }

    @keyframes leftToRight {
        0% {
            transform: translate(0px);
        }
        100% {
            transform: translate(69px);
        }
    }

    @keyframes rightToLeft {
        0% {
            transform: translate(69px);
        }
        100% {
            transform: translate(0px);
        }
    }
	
	.customerService {
         position: fixed;
         right: 3%;
         bottom: 40px;
    }
	

	
    .customerService img {
        width: 40px;
        height: 40px;
		border-style: solid;
		border-radius: 10px;
    }
	
		
</style>
<body>
<div>
    <div class="bg animate_grg_fadeInRight">
	<div class="title">Welcome To GRG Digital Banking</div>
        <div class="bg-left">
            <img class="logo" src="../../images/img_2.4/logo_blue.png">
            <div class="left-content">
                <div class="hand-click-btn-box" type='button' id='OnStart' tag='OnStart'>
                    <div class="btn-box">MainMenu</div>
                    <img class="hand-click-img" src="../../images/img_2.4/hand-click.png" type='button' id='OnStart' tag='OnStart'>
                </div>
            </div>
        </div>
        <div class="bg-right">
            <div class="right-content">
                <div class="gradient"></div>
                <img class="card-img" src="../../images/img_2.4/home_insertcard.png">
            </div>
        </div>
		
    <div class="mask"></div>
    </div>
	<div class="customerService">
            <g-button round transparent type='button' id='OnHelp' tag='OnHelp'>
                <img src="../../images/customer_service.png" alt="">
            </g-button>
        </div>
</div>
</body>
</html>
<script>
    // 切换语言按钮暂时隐藏
    function changeLanguage() {
        let el = document.getElementById('language');
        if (el.innerText === 'ENG') {
            el.style = 'animation:leftToRight 150ms linear forwards 100ms;'
            el.innerText = '中'
        } else {
            el.style = 'transform:translate(69px); animation:rightToLeft 150ms linear forwards 100ms;'
            el.innerText = 'ENG'
        }
    }
</script>
