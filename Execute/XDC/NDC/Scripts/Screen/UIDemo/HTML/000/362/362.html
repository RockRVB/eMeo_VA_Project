<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" type="text/css" href="../../css/default.css" />
<link rel="stylesheet" type="text/css" href="../../css/Button.css" />
<SCRIPT type="text/javascript" src="../../js/util.js" ></SCRIPT>
</head>
<body>
	<header>
		<div id="logo">
			welcome to use
		</div>
		<div id="showTime"></div>	
	</header>
    <div id="headerNav">
        <div class="exit" id="CANCEL" tag="F7" type="Button" >exit</div>
    </div>
		<div class="form" >
			<div   class="login">Please enter transfer amount, then press Enter</div>
			<div class="password" >
				<input content="{Binding InputText}" type="text" placeholder="amount" id="AMTENTRYText"  name="info_entry" maxlength="20" />
			</div>
		</div>
		
		<div id="btn_container" class="operate">
			<ul>
				<li class="exit" id="F8" tag="F8" type="Button">CANCEL</li>
				<li class="yes" id="F6" tag="F6" type="Button">CLEAR</li>
				<li class="yes" id="F4" tag="F4" type="Button">ENTER</li>
			</ul>
		</div>

</body>
