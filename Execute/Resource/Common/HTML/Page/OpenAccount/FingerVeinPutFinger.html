<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
		<title>放置手指</title>
		<link rel="stylesheet" type="text/css" href="../../css/CN.css"  replace="1"/>
		<script src="../../js/require.js" type="text/javascript" charset="utf-8" data-main="../../js/main" async="true"></script>
		<script src="../../js/jquery-3.7.0.min.js"></script>
        <script src="../../js/CreateNavBar.js" type="text/javascript" charset="utf-8"  ></script>
	</head>
	<body class="all_bg">
		<header class="index_top clear">
			<div class="logo"></div>
			<div class="index_top_title">
				<div class="count_down_time" style="display:none" id="Counter" type="countdown" content="{Binding Count}" visible="{Binding CouterVisible}">10</div>
			</div>
		</header>
		<div class="ibank_container">
			<div class="business_container">
			    <div class="transaction_result">
					    <div class="transaction_title" ids="IDS_FingerVeinPutFingerTips">请放置您的手指到指静脉扫描仪上</div>
						    <div class="transaction_res_contain">
                                 <div class="transaction_res_contain_div">
                                <strong ids="IDS_FingerVeinRetryTimes">重试次数：</strong>
                                <strong id="retryTimes" type="text" content="{Binding RetryTimes}"> 1</strong>
                                <strong>/3</strong>
                                </div>
						    </div>
			    </div>
			</div>
		</div>
			<input type="text" id="allSteps" content="{Binding VTM_AllTranSteps}" hidden="hidden"></input>
			<input type="text" id="curStep" content="{Binding VTM_CurTranStep}" hidden="hidden"></input>
	</body>
</html>
