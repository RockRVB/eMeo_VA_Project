<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
    <title>首页</title>
    <script src="../../js/vue.min.js"></script>
    <script src="../../js/grg-ui.min.js"></script>
    <script src="../../js/swiper4.min.js"></script>
    <script src="../../js/ibank.js"></script>
    <link rel="stylesheet" href="../../css/ibank.css">
    <link rel="stylesheet" href="../../css/grg-ui.min.css">
    <link rel="stylesheet" href="../../css/swiper4.min.css">
    <link rel="stylesheet" href="../../css/animate.grg.css">
</head>
<style>
    .bg {
        display: flex;
        justify-content: center;
        width: 100%;
        height: 100vh;
        font-family: "Alibaba Sans";
    }

    .mask {
        position: absolute;
        z-index: 0;
        background: url("../../images/img_2.4/bg-business.png") no-repeat center center/100% 100%;
        width: 100%;
        height: 100%;
    }

    .main-context {
        position: relative;
        z-index: 1;
        margin-top: 12%;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .title {
        margin-bottom: 120px;
        width: 100%;
        text-align: center;
        height: 77px;
        line-height: 77px;
        font-size: 50px;
        font-weight: bold;
        color: #231815;
        font-family: 'Alibaba Sans';
    }

    @media only screen and (width: 1280px) {
        .title {
            height: 62px;
            line-height: 62px;
            font-size: 40px;
        }
    }

</style>
<body>
<div>
    <div class="bg">
        <div class="main-context">
            <div class="title" ids="ids_Common_SystemStarting">System Is Starting!</div>
            <img src="../../images/img_2.4/wait.png">
        </div>
        <div class="mask"></div>
    </div>
</div>
</body>
</html>
