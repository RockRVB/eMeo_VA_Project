<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
		<title>点钞结果</title>
		<link rel="stylesheet" type="text/css" href="../../css/base.css"/>
		<link rel="stylesheet" type="text/css" href="../../css/CN.css"  replace="1"/>
		<script src="../../js/require.js" type="text/javascript" charset="utf-8" data-main="../../js/main" async="true"></script>
	</head>
	<body class="index">
		<div class="ibank_container">
			<header class="index_title clear">
				<div class="logo">
					<img src="../../../Image/CN/index/logo.png"/>
				</div>
				<div class="time_title">
					10
				</div>
			</header>
			<article class="ibank_contain_frame">
				<div class="business_contain">
					<div class="input_acount_contain">
						<div class="input_acount_img">
							<img src="../../../Image/CN/cash/icon_card1.png"/>
						</div>
						<div class="input_acount_contain_con clear">
							<div class="input_acount_title">
								点钞结果
							</div>
							<div class="input_acount_contain_val">
								<h4>钞票张数：<span>1</span>张</h4>
								<h4>钞票面额：<span>100.00</span>元</h4>
								<h4>钞票总额：<span>100</span>元</h4>
							</div>
						</div>
						<div class="business_button button_three">
							<button class="cancel_btn">取消</button>
							<button class="enter_btn">继续放钞</button>
							<button class="other_btn">确认面额</button>
						</div>
					</div>
					
				</div>
			</article>
		</div>
	</body>
</html>
