<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.0 Transitional//EN">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=gb2312" />
<title></title>
<link rel="stylesheet" type="text/css" href="../../css/CN.css" replace="1" />
<link rel="stylesheet" type="text/css" href="../../css/Button.css" />
<script defer type="text/javascript" src="../../js/ShowResource.js"></script>
</head>
<body>
<div class="backgroundDiv">
  <div class="CounterDiv" style="display:none" id="Counter" type="countdown" content="{Binding Count}" visible="{Binding CouterVisible}"> </div>
  <div class="mainDivOneLine" ids="IDS_SelectService"> </div>
  <!--移动-->
  <div class="f1Div" id="F1" tag="OnF1" type="Button" visible="{Binding F1_Visible}"> <img src="../../../Image/CN/Btn_Bg1_left_up.png" id="bgimg" up="(btnbg1leftup)" down="(btnbg1leftdw)" /> <span class="buttonLeft" ids="IDS_BtnCMCC"></span> </div>
  <!--电费-->
  <div class="f2Div" id="F2" tag="OnF2" type="Button" visible="{Binding F2_Visible}"> <img src="../../../Image/CN/Btn_Bg1_right_up.png" id="bgimg" up="(btnbg1rightup)" down="(btnbg1rightdw)" /> <span class="buttonRight" ids="IDS_BtnPR"></span> </div>
  <!--联通-->
  <div class="f3Div" id="F3" tag="OnF3" type="Button" visible="{Binding F3_Visible}"> <img src="../../../Image/CN/Btn_Bg1_left_up.png" id="bgimg" up="(btnbg1leftup)" down="(btnbg1leftdw)" /> <span class="buttonLeft" ids="IDS_BtnCU"></span> </div>
  <!--水费-->
  <div class="f4Div" id="F4" tag="OnF4" type="Button" visible="{Binding F4_Visible}"> <img src="../../../Image/CN/Btn_Bg1_right_up.png" id="bgimg" up="(btnbg1rightup)" down="(btnbg1rightdw)" /> <span class="buttonRight" ids="IDS_BtnWR"></span> </div>
  <!--电信-->
  <div class="f5Div" id="F5" tag="OnF5" type="Button" visible="{Binding F5_Visible}"> <img src="../../../Image/CN/Btn_Bg1_left_up.png" id="bgimg" up="(btnbg1leftup)" down="(btnbg1leftdw)" /> <span class="buttonLeft" ids="IDS_BtnCT"></span> </div>
  <!--大石桥水费-->
  <div class="f6Div" id="F6" tag="OnF6" type="Button" visible="{Binding F6_Visible}"> <img src="../../../Image/CN/Btn_Bg1_right_up.png" id="bgimg" up="(btnbg1rightup)" down="(btnbg1rightdw)" /> <span class="buttonRight" ids="IDS_BtnDSQWR"></span> </div>  
  <!--煤气费-->
  <div class="f7Div" id="F7" tag="OnF7" type="Button" visible="{Binding F7_Visible}"> <img src="../../../Image/CN/Btn_Bg1_left_up.png" id="bgimg" up="(btnbg1leftup)" down="(btnbg1leftdw)" /> <span class="buttonLeft" ids="IDS_BtnGR"></span> </div>
  <!--返回-->  
  <div class="f8Div" id="F8" tag="OnContinue" type="Button"> <img src="../../../Image/CN/Btn_Bg2_right_up.png" id="bgimg" up="(btnbg2rightup)" down="(btnbg2rightdw)" /> <span class="buttonRight" ids="IDS_Return"></span> </div>
 
</div>
</body>
</html>
