<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.0 Transitional//EN">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=gb2312" />
<title></title>
<link rel="stylesheet" type="text/css" href="../../css/CN.css" replace="1" />
<link rel="stylesheet" type="text/css" href="../../css/Button.css" />
<script defer type="text/javascript" src="../../js/ShowResource.js"></script>
</head>
<body>
<div class="backgroundDiv">
  <div class="CounterDiv" style="display:none" id="Counter" type="countdown" content="{Binding Count}" visible="{Binding CouterVisible}"> </div>
  <div class="mainDivOneLine" ids="IDS_ConfirmPaymentInfo"> </div>
  <div class="inputDivRightAlign2"> <span class="inputPrompt" ids="IDS_PaymentNumber"></span>
    <input class="inputTextLeftAlign" id="PaymentNumber" type="text" size="23" content="{Binding core_OtherAccount}" format="" />
  </div>
  <div class="inputDivRightAlign2"> <span class="inputPrompt" ids="IDS_PaymentAccntName"></span>
    <input class="inputTextLeftAlign" id="PaymentAccntName" type="text" size="23" content="{Binding proj_UserName}" format="" />
  </div>
  <div class="inputDivRightAlign2"> <span class="inputPrompt" ids="IDS_PaymentAmount"></span>
    <input class="inputTextLeftAlign" id="PaymentAmount" type="text" size="23" content="{Binding core_ScreenAmount}" />
  </div>
  <div class="f6Div" id="F6" tag="OnConfirm" type="Button"> <img src="../../../Image/CN/Btn_Bg1_right_up.png" id="bgimg" up="(btnbg1rightup)" down="(btnbg1rightdw)" /> <span class="buttonRight" ids="IDS_Confirm"></span> </div>
  <div class="f8Div" id="F8" tag="OnCancel" type="Button"> <img src="../../../Image/CN/Btn_Bg2_right_up.png" id="bgimg" up="(btnbg2rightup)" down="(btnbg2rightdw)" /> <span class="buttonRight" ids="IDS_Cancel"></span> </div>
</div>
</body>
</html>
