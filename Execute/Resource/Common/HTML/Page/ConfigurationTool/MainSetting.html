<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eCAT Configuration Tool</title>
    <script src="../../js/vue.min.js"></script>
    <link rel="stylesheet" href="../../css/ConfigurationTool/configTool.css">

    <style>
     #Table1 .table-label{
        width: 25%;
     }
     #Table1 #Select1{
        width: 63%;
     }
     #Checkbox1{
        margin-left: 120px;
     }

     
    </style>
</head>

<body>
    <div id="app" currentSetting="MainSetting">
        <div class="header"></div>

        <div class="sidebar" ref="sidebar">
            <div class="menu-top">
                <img :src="profileImg" alt="Profile Image">
                <h2>{{selectedATMType || 'XXX'}}</h2>
                <button @click="showModal">⇋</button>
            </div>
            <div class="menu-containers" v-for="menu in menus">
                <div class="menu-container">
                    <div class="setting-category" @click="toggleDropdown(menu.id)">
                        <span class="item-icon">📦</span>
                        <span>{{ menu.label }}</span>
                        <span class="dropdown-arrow" :class="{ 'open': menu.isDropdownOpen }">></span>
                    </div>
    
                    <div class="setting-item" v-show="menu.isDropdownOpen" :id="item.id"  :class="{ 'active': item.id === setting }"
                      v-for="item in settings[menu.id]" :key="item.id"  >
                      <div class="setting-item-parent" @click="toggleSelection(item)" :style="getStyle(item.id)">
                        <span class="item-icon">{{ item.icon }}</span>
                        <span>{{ item.label }}</span>
                        <span class="dropdown-arrow" :class="{ 'open': item.isDropdownOpen }">></span>
                      </div>
    
                      <div class="setting-item-child" v-if="itemChilds.owner === item.id && itemChilds.content" v-show="item.isDropdownOpen" :id="childItem" :style="getStyle(childItem)" :class="{ 'active': childItem === itemChild }"
                        v-for="childItem in itemChilds.content" :key="childItem"  @click="toggleChildSelection(childItem)">
                        <span class="item-icon">-</span>
                        <span>{{ childItem }}</span>
                      </div>
                    </div>
                </div>
            </div>
            <div class="menu-container">
                <div class="setting-category">
                    <span class="item-icon"><</span>
                    <span @click="getPage(backPage)">Back</span>
                </div>
            </div>
        </div>

        <div class="content">
            <div>
                <h2 id="content-System">System</h2>
                <table id="Table1">
                    <tr>
                        <td class="table-label">
                            <Label>ATM Series</Label>
                        </td>
                        <td>
                            <input id="Input1" type="text" v-model="settingData.System.ATMType">
                        </td>
                    </tr>
                    <tr>
                        <td class="table-label">
                            <Label>ATM Number</Label>
                        </td>
                        <td>
                            <input id="Input1" type="number" v-model="settingData.System.ATMNumber">
                            </input>
                        </td>
                    </tr>
                    <tr>
                        <td class="table-label">
                            <Label>Bank Number</Label>
                        </td>
                        <td>
                            <input id="Input1" type="number" v-model="settingData.System.bankNumber">
                            </input>
                        </td>
                    </tr>
                    <tr>
                        <td class="table-label">
                            <Label>Branch Number</Label>
                        </td>
                        <td>
                            <input id="Input1" type="number" v-model="settingData.System.branchNumber">
                            </input>
                        </td>
                    </tr>
                </table>
            </div>
            <div>
                <h2 id="content-Language">Language</h2>
                <table id="Table1">
                    <tr>
                        <td class="table-label">
                            <Label>Display</Label>
                        </td>
                        <td>
                            <select id="Select1" type="select" v-model="settingData.Language.UI">
                                <option value="CN" selected="selected">Chinese</option>
                                <option value="EN">English</option>
                            </select>
                        </td>
                    </tr>

                    <tr>
                        <td class="table-label">
                            <Label>Maintenance</Label>
                        </td>
                        <td><select id="Select1" type="select" v-model="settingData.Language.Maintenance">
                                <option value="CN">Chinese</option>
                                <option value="EN">English</option>
                            </select></td>
                    </tr>

                    <tr>
                        <td class="table-label">
                            <Label>JPTR</Label>
                        </td>
                        <td><select id="Select1" type="select" v-model="settingData.Language.JPTR">
                                <option value="CN">Chinese</option>
                                <option value="EN">English</option>
                            </select></td>
                    </tr>

                    <tr>
                        <td class="table-label">
                            <Label>RPTR</Label>
                        </td>
                        <td><select id="Select1" type="select" v-model="settingData.Language.RPTR">
                                <option value="CN">Chinese</option>
                                <option value="EN">English</option>
                            </select></td>
                    </tr>
                </table>
            </div>

            <div>
                <h2 id="content-Door">Door</h2>
                <table id="Table1">
                    <tr>
                        <td><input id="Checkbox1" type="checkbox" v-model="settingData.Door.enableOperatorSwitch">
                            Operator Switch
                        </td>
                    </tr>
                    <tr>
                        <td><input id="Checkbox1" type="checkbox" v-model="settingData.Door.enableCabinet">
                            Cabinet
                        </td>
                    </tr>
                    <tr>
                        <td><input id="Checkbox1" type="checkbox" v-model="settingData.Door.enableSafeDoor">
                            SafeDoor
                        </td>
                    </tr>
                </table>
            </div>
            <div>
                <h2 id="content-Others">Others</h2>
                <table id="Table1">
                    <tr>
                        <td class="table-label">
                            <Label>Front Screen</Label>
                        </td>
                        <td>
                            <select id="Select1" type="select" v-model="settingData.Others.frontScreen">
                                <option value="0">0</option>
                                <option value="1">1</option>
                            </select>
                        </td>                  
                    </tr>
                    <tr>
                        <td class="table-label">
                            <Label>Touch Screen</Label>
                        </td>
                        <td>
                            <select id="Select1" type="select" v-model="settingData.Others.touchScreen">
                                <option value="0">0</option>
                                <option value="1">1</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td class="table-label">
                            <Label>Twin Screen Location</Label>
                        </td>
                        <td>
                            <input id="Input1" type="text" v-model="settingData.Others.twinScreenLocation">
                        </td>
                    </tr>

                    <tr>
                        <td class="table-label">
                            <Label>TopMost</Label>
                        </td>
                        <td>
                            <select id="Select1" type="select" v-model="settingData.Others.topmost">
                                <option value="0">0</option>
                                <option value="1">1</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td class="table-label">
                            <Label>UI Location</Label>
                        </td>
                        <td>
                            <input id="Input1" type="text" v-model="settingData.Others.UILocation">
                        </td>
                    </tr>
                    <tr>
                        <td class="table-label">
                            <Label>ProtocolType</Label>
                        </td>
                        <td>
                            <select id="Select1" type="select" v-model="settingData.Others.ProtocolType">
                                <option value="0">ISO8583</option>
                                <option value="1">NDC</option>
                                <option value="2">DDC</option>
                            </select>
                        </td>
                    </tr>
                    <!-- <tr>
                        <td class="table-label">
                            <Label>eCATKeeper</Label>
                        </td>
                        <td>
                            <select id="Select1" type="select" v-model="settingData.Others.eCATKeeper">
                                <option value="0">0</option>
                                <option value="1">1</option>
                            </select>
                        </td>
                    </tr> -->
                </table>
            </div>
            
            

        </div>

        <div class="buttons buttons-bottom"></div>

        <div class="modal-bg" v-if="isModalVisible" @click="hideModal"></div>
        <div class="modal" v-if="isModalVisible">
            <h3>ATM Type</h3>
            <select v-model="currentSelectType">
                <option v-for="type in atmTypes" :key="type" :value="type">{{ type }}</option>
            </select>
            <div class="buttons">
                <button class="btn cancel" @click="hideModal">Cancel</button>
                <button class="btn" @click="confirmSelection(true)">Confirm & Apply</button>
                <button class="btn" @click="confirmSelection(false)">Confirm & No Apply</button>
            </div>
        </div>

        <div v-if="showAlertBox" class="custom-alert">
            <span>{{ alertMessage }}</span>
            <div class="buttons">
                <button @click="closeAlert">OK</button>
            </div>     
        </div>
        <div v-if="isConfirmVisible" class="custom-confirm">
            <span>{{ confirmMessage }}</span>
            <div class="buttons">
                <button @click="cancelConfirmation">Cancel</button>
                <button @click="confirmAction">Confirm</button>
            </div>
        </div>

    </div>

    <script src="../../js/ConfigurationTool/configTool.js"></script>
</body>

</html>
