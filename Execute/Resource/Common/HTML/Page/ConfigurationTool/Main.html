<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eCAT Configuration Tool</title>
    <script src="../../js/vue.min.js"></script>
    <link rel="stylesheet" href="../../css/ConfigurationTool/configTool.css">
    <style>
        body {
            display: grid;
            justify-content: center;
            align-items: center;
        }
        .container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 400px;
        }

        .container h1 {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .container p {
            color: #007bff;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .container label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            text-align: left;
        }

        .container button {
            width: 100%;
            padding: 10px 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            border: none;
            background: linear-gradient(to right, #0d6efd, #007bff);
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        .container button:hover {
            background: linear-gradient(to right, #0056b3, #004085);
        }

        .container button:active {
            background: linear-gradient(to right, #004085, #002752);
        }

        .container select {
            margin-bottom: 10px;
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #007bff;
            border-radius: 5px;
            background-color: #f0f8ff;
            color: #333;
            font-size: 16px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
    </style>
</head>

<body>
    <div id="app" currentSetting="BankSetting">
        <div class="header"></div>

        <div class="container">
            <h1>Welcome to eCAT Configuration Tool</h1>
            <p>Please select the device you want to configure first</p>
            <label for="atm-type" class="left-align">
                <span style="color: red;">*</span>ATM Type
            </label>
            <select v-model="selectedATMType" id="atm-type">
                <option v-for="type in atmTypes" :key="type" :value="type">{{ type }}</option>
            </select>
            
            <button class="confirm-btn" @click="atmTypesConfirm">Confirm</button>
        </div>

        <div v-if="showAlertBox" class="custom-alert">
            <span>{{ alertMessage }}</span>
            <div class="buttons">
                <button @click="closeAlert">OK</button>
            </div>     
        </div>
        <div v-if="isConfirmVisible" class="custom-confirm">
            <span>{{ confirmMessage }}</span>
            <div class="buttons">
                <button @click="cancelConfirmation">Cancel</button>
                <button @click="mainConfirm(true)">Confirm & Apply</button>
                <button @click="mainConfirm(false)">Confirm & Don't Apply</button>
            </div>
        </div>
    </div>
    
    <script src="../../js/ConfigurationTool/configTool.js"></script>
</body>

</html>
