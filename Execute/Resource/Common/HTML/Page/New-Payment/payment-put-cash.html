<!DOCTYPE html>
<html lang="en">
  
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>select item</title>
    <script src="../../js/vue.min.js">
    </script>
    <script src="../../js/grg-ui.min.js">
    </script>
    <script src="../../js/vue-i18n.js">
    </script>
    <script src="../../js/jquery-3.7.0.js">
    </script>
    <script src="../../js/coreScript.js">
    </script>
    <script src="../../js/ibank.js">
    </script>
    <link rel="stylesheet" href="../../css/grg-ui.min.css">
    <link rel="stylesheet" href="../../css/animate.grg.css">
    <link rel="stylesheet" href="../../css/ibank.css">
    <style>
	.main-btn { 
	display: flex; 
	flex-direction: column; 
	align-items: center; 
	} 
	
	.btn-position{ 
	position: absolute; 
	bottom: 5%; 
	left: 40%;
	} 
	
	.info-box {
    display: flex;
    width: 973px;
    height: 468px;
    background: linear-gradient(270deg, #F4F7FF 0%, #E1EAFF 100%);
    box-shadow: 0px 6px 30px 0px rgba(0, 39, 125, 0.2);
    border-radius: 8px;
    margin: 5% 0 0 50%;
    transform: translateX(-50%);
	}
	
	.info-box .info-left-box {
    width: 50%;
    color: #666660;
    padding-left: 30px;
    box-sizing: border-box;
    font-size: 28px;
    text-align: left;
	}
	
	.text-1 {
    margin-top: 40px;
	}
	
	.text-2 {
    margin-top: 60px;
	}

	.val-class {
    color: #333333;
    font-size: 40px;
    font-weight: bold;
	}

	.info-left-box .line {
    width: 430px;
    height: 1px;
    border: 1px solid #979797;
    margin: 25px 0;
    transform: unset;
	}

	.info-box .info-right-box {
    width: 50%;
    height: 468px;
    background: rgba(255, 255, 255, 0.68);
    border-radius: 8px;
    backdrop-filter: blur(10px);
	}

	.info-right-box .right-img {
    display: inline-block;
    width: 300px;
    /* margin-top: 50px; */
	margin: 10% 0 0px 20%;
	}

	.info-right-box .put-in-cash-box {
    width: 274px;
    height: 60px;
    line-height: 60px;
    background: #E1EAFF;
    border-radius: 8px;
    font-size: 25px;
    color: #296CFF;
    margin: -50px 0 0px 110px;
	text-align: center;
    font-weight: bold;
	}

 </style>
  </head>
  
  <body>
    <div id="app">
      <div id="grg-header" class="grg-header">
      </div>
      <div id="grg-main" class="grg-main animate_grg_fadeInRight_other">
        <!-- <div class="count-down">
        <div class="count-down-2">60</div>
        </div> -->
        <!-- <div class="main-title">Please select the payment method</div> -->
        <div class="info-box">
              <div class="info-left-box">
                <div class="text-1" ids="ids_NewPayment_checkbill">Please check your bill</div>
                <div class="text-2" ids="ids_NewPayment_Paymenttype">Payment type</div>
                <div class="text-3 val-class" content='{Binding payment_BillType mode=2}' ids="ids_NewPayment_MobileBill">Postpaid Mobile Bill</div>
                <div class="line">
                </div>
                <div class="text-4" ids="ids_NewPayment_Amount">Amount</div>
                <div class="text-5">
                  <span content='{Binding core_CurrentCurrency mode=2}'>CNY</span>
                  <span class="val-class" content='{Binding payment_Amount mode=2}'>66</span>
                </div>
              </div>
              <div class="info-right-box">
                <img src="../../images/img_2.4/put-cash.png" alt="" class="right-img">
                <div class="put-in-cash-box"ids="ids_NewPayment_putcash2">Please put in cash.</div>
              </div>
            </div>
			<div class="button-box" style="bottom: 90px;">			  
			  <div class="grg-btn grg-confirm" type='button' tag='OnConfirm' ids='ids_Btn_confirm'>
				<img class="icon-img" src="../../images/img_2.4/icon-ok.png" alt="">Confirm
			  </div>
			</div>
        <!-- <button class="btn-retry btn-position" id='OnCancel' type='button' tag='OnCancel'> -->
          <!-- <img class="btn-img-ok" src="../../images/img_2.4/icon-back@2x.png" ids='ids_Btn_back' alt="">Back</button> -->
      </div>
    </div>
  </body>

</html>
<script>var app = new Base({
    i18n: i18n,
    data: {},
    methods: {},
    computed: {},
    mounted: function() {}
  }).$mount('#app')</script>
