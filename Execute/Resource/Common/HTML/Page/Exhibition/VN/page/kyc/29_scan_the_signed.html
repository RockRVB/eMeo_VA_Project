      <script>
        var $frame = $('.frame');
        var $slidee = $('.slidee');
        var $wrap = $frame.parent();
        
        $frame.sly({
          horizontal: 1,
          itemNav: 'basic',
          smart: 1,
          activateOn: 'click',
          mouseDragging: 1,
          touchDragging: 1,
          releaseSwing: 1,
          startAt: 0,
          scrollBar: $wrap.find('.scrollbar'),
          scrollBy: 1,
          activatePageOn: 'click',
          speed: 300,
          elasticBounds: 1,
          easing: 'easeOutExpo',
          dragHandle: 1,
          dynamicHandle: 1,
          clickBar: 1,
        });
        
        function setImage(path){
          $slidee.html('');
          
          if(path){
            var img = path.split(',');
            
            for(var i = 0; i < img.length; i++){
            
              (function(index){
                var item = img[index];
                var element = $('<div class="image_item"><img class="image" src="' + item + '" width="340"><div class="bt_img"><a style="width: 100%; border-bottom-left-radius: 20px;" class="bt_zoom" href="' + item + '"></a><div class="clear"></div></div></div>');
                
                element.find('.bt_remove').click(function(){				
                  goto('OnF' + (index + 1));
                })
                
                $slidee.append(element);
              })(i);
              
            }
            
            $frame.sly('reload');
            $('.bt_zoom').dotozoom({
              onOpen: function(){
                goto('OnZoomOpen');
              },
              onClose: function(){
                goto('OnZoomClose');
              }
            });
            
            if(img.length <= 3){
              $wrap.find('.scrollbar').css('visibility', 'hidden');
            } else {
              $wrap.find('.scrollbar').css('visibility', 'visible');
            }
            
            $('.button_container_footer').removeClass('hide');
          } else {
            $frame.sly('reload');
            $wrap.find('.scrollbar').css('visibility', 'hidden');
            $('.button_container_footer').addClass('hide');
          }
        }
        
      </script>
