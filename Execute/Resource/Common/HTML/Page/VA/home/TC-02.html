<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer Group</title>
    <link rel="stylesheet" href="../../../css/VA/style.css">
    <script src="../../../js/coreScript.js"></script>
    <script src="../../../js/VA/common.js"></script>
    <script src="../../../js/VA/jquery-3.3.1.min.js"></script>
</head>
<body>
    <div class="stm-layout">
        <!-- Header -->

        <stm-auth-task-header></stm-auth-task-header>

        <!-- Body -->
        <main class="stm-body transfer-body">
            <div class="stm-content">

                <h2 class="stm-subtitle" ids="ids_VAB_select_transfer_type">Quý khách vui lòng chọn hình thức chuyển khoản</h2>

                <!-- Large Cards Flex Container -->
                <div class="stm-large-cards">
                    <!-- Card 1 -->
                    <div class="stm-card-lg" id="tien-mat">
                        <stm-card
                                icon-url="../../../images/VA/card-add.png"
                                title="Tiền mặt"
                                ids="ids_VAB_transfer_type_cash"
                        >
                        </stm-card>
                    </div>
                    <div class="stm-card-lg" id="tk-thanh-toan">
                        <stm-card
                                icon-url="../../../images/VA/card-add.png"
                                title="Tài khoản thanh toán"
                                ids="ids_VAB_transfer_type_account"
                        >
                        </stm-card>
                    </div>
                </div>

            </div>
        </main>

        <stm-footer></stm-footer>
    </div>
</body>
<script src="../../../js/VA/scale.js"></script>
<script>
    $(document).ready(function() {

    })
</script>
</html>
