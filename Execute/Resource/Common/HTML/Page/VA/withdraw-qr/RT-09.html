<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit Error</title>
    <link rel="stylesheet" href="../../../css/VA/style.css">
    <script src="../../../js/coreScript.js"></script>
    <script src="../../../js/VA/common.js"></script>
    <script src="../../../js/VA/jquery-3.3.1.min.js"></script>
</head>
<body>
<div class="stm-layout">
    <!-- Header -->

    <stm-only-logo-header></stm-only-logo-header>

    <!-- Body -->
    <main class="stm-body confirm-deposit-body">
        <div class="stm-content">
            <div class="cash-deposit-error-wrap">
                <div class="error-deposit-img-container">
                    <img src="../../../images/VA/icon-error.svg" width="128" height="128" style="margin: auto;">
                </div>

                <h2 class="cash-deposit-error-title" ids="ids_VAB_rt_09_account_valid_not_exist">Không tồn tại tài khoản thanh toán hợp lệ</h2>
                <div style="text-align: center;">
                    <span class="cash-deposit-message">Vui lòng quay về Trang chủ để mở tài khoản hoặc thực hiện giao dịch khác.</span>
                </div>

                <span style="font-size: 25px; margin-top: 180px;" ids="ids_VAB_rt_09_auto_back_home_countdown" id="countdown-backto-home"></span>

                <div class="statement-btns-container" style="margin-top: 30px;">
                    <div class="dialog-actions">
                        <button class="btn-dialog-secondary" id="confirm_deposit_info" tag="confirm_deposit_info">
                            <span ids="ids_VAB_rt_09_back_home_btn">Trang chủ</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <stm-footer></stm-footer>
    <input style="display: none;" id="input-val" value='{}' />
    <input style="display: none;" id="output-val" value='{}'/>
</div>
<script src="../../../js/VA/scale.js"></script>
<script>
    $(document).ready(function (){
        const countdownText = document.getElementById("countdown-backto-home");

        let timeLeft = 120;
        countdownText.innerText = `Tự động về màn hình Trang chủ sau ${timeLeft}s`
        const timer = setInterval(() => {
            timeLeft--;

            countdownText.innerText = `Tự động về màn hình Trang chủ sau ${timeLeft}s` ;

            if (timeLeft <= 0) {
                clearInterval(timer);
            }
        }, 1000);
    })

</script>
</body>
</html>
