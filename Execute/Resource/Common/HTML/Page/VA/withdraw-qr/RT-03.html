<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash Deposit Slip</title>
    <link rel="stylesheet" href="../../../css/VA/style.css">
    <script src="../../../js/coreScript.js"></script>
    <script src="../../../js/VA/common.js"></script>
</head>
<body>
<div class="stm-layout">
    <!-- Header -->

    <stm-auth-task-header id="auth-task-header"></stm-auth-task-header>

    <!-- Body -->
    <main class="stm-body confirm-deposit-body">
        <div class="stm-content">
            <stm-progress-bar
                    current-step="3"
                    steps='[
                        {"label": "Xác thực", "ids" : "ids_VAB_withdraw_qr_step_1"},
                        {"label": "Chọn tài khoản", "ids" : "ids_VAB_withdraw_qr_step_2"},
                        {"label": "Rút tiền", "ids" : "ids_VAB_withdraw_qr_step_3"},
                        {"label": "Hoàn tất", "ids" : "ids_VAB_withdraw_qr_step_4"}
                    ]'>
            </stm-progress-bar>

            <div class="statement-actions-container">
                <div class="statement-actions-wrap">
                    <h2 class="section-title" ids="ids_VAB_rt_03_pls_input_cash_value">Vui lòng nhập số tiền cần rút</h2>

                    <span class="text-alert-red" style="font-size: 30px;" id="invalid-message" ids="ids_VAB_rt_03_multiple_of_50k">Số tiền phải là bội số của 50,000</span>
                    <input class="withdraw_value_input" id="withdraw-input">
                    <span class="text-alert-red" id="invalid-submessage" style="visibility: hidden;" ids="ids_VAB_rt_03_cash_value_invalid">Số tiền không hợp lệ</span>
                    <div class="number-keyboard-grid" style="margin-top: 20px;">
                        <button class="number-key" ids="ids_VAB_rt_03_key_num_1">1</button>
                        <button class="number-key" ids="ids_VAB_rt_03_key_num_2">2</button>
                        <button class="number-key" ids="ids_VAB_rt_03_key_num_3">3</button>
                        <button class="number-key" ids="ids_VAB_rt_03_key_num_4">4</button>
                        <button class="number-key" ids="ids_VAB_rt_03_key_num_5">5</button>
                        <button class="number-key" ids="ids_VAB_rt_03_key_num_6">6</button>
                        <button class="number-key" ids="ids_VAB_rt_03_key_num_7">7</button>
                        <button class="number-key" ids="ids_VAB_rt_03_key_num_8">8</button>
                        <button class="number-key" ids="ids_VAB_rt_03_key_num_9">9</button>
                        <button class="number-key" id="btn-delete-number">
                            <img src="../../../images/VA/icon-delete.svg">
                        </button>
                        <button class="number-key" ids="ids_VAB_rt_03_key_num_0">0</button>
                        <button class="number-key" ids="ids_VAB_rt_03_key_num_000">000</button>
                    </div>
                </div>

                <div class="statement-btns-container" style="padding-bottom: 7px;">
                    <div class="dialog-actions">
                        <button class="btn-dialog-secondary" id="confirm_deposit_btn" tag="confirm_deposit">
                            <span ids="ids_VAB_rt_03_confirm_withdraw_cash_value">Xác nhận</span>
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <stm-footer-previous></stm-footer-previous>
    <stm-cancel-trans-dialog id="cancel-trans-dialog"></stm-cancel-trans-dialog>
</div>
<script src="../../../js/VA/scale.js"></script>
<script>
    const headerElement = document.getElementById("auth-task-header");
    const cancelTransDialog = document.getElementById("cancel-trans-dialog");
    const confirmBtn = document.getElementById("confirm_deposit_btn");
    const subMessage = document.getElementById("invalid-submessage");

    headerElement.onCancelTransBtnClick = function() {
        cancelTransDialog.openDialog = true
    };

    const inputField = document.querySelector('.withdraw_value_input');
    const keys = document.querySelectorAll('.number-key');

    function formatNumber(value) {
        const number = value.replace(/\D/g, '');
        return number.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }

    function validateNumber(num){
        const numValue = Number(num);
        return numValue % 50000 === 0;
    }

    keys.forEach(key => {
        key.addEventListener('click', () => {
            inputField.style.color = 'black';
            subMessage.style.display = 'none';
            // Lấy giá trị hiện tại (xóa hết dấu phẩy để lấy chuỗi thuần)
            let currentVal = inputField.value.replace(/\D/g, '');
            const btnText = key.innerText.trim();
            const isDelete = key.querySelector('img') || key.id === 'btn-delete-number';

            if (isDelete) {
                // Xử lý nút Xóa
                currentVal = inputField.value.slice(0, -1);
            } else {
                // Chặn nhập số 0 ở đầu
                if (currentVal === "" && (btnText === "0" || btnText === "000")) return;

                currentVal += btnText;
            }

            inputField.value = formatNumber(currentVal);
            inputField.focus();
        });
    });

    inputField.addEventListener('keydown', (e) => {
        if (!/^[0-9]$/.test(e.key)) {
            e.preventDefault();
        }
    });

    confirmBtn.addEventListener('click', () => {
        const withdrawInput = document.getElementById("withdraw-input");
        if(!validateNumber(withdrawInput.value.replace(/\D/g, ''))){
            message.style.display = 'inline-block';
            inputField.style.color = 'red';
            subMessage.style.display = 'inline-block';
        }
    });
</script>
</body>
</html>
