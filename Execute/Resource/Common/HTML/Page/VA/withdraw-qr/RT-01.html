<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TKTT List</title>
    <link rel="stylesheet" href="../../../css/VA/style.css">
    <script src="../../../js/coreScript.js"></script>
    <script src="../../../js/VA/common.js"></script>
    <script src="../../../js/VA/jquery-3.3.1.min.js"></script>
</head>
<body>
<div class="stm-layout">
    <!-- Header -->

    <stm-auth-task-header id="auth-task-header"></stm-auth-task-header>

    <!-- Body -->
    <main class="stm-body account-list-body">
        <div class="stm-content account-content">

            <stm-progress-bar
                    current-step="2"
                    steps='[
                        {"label": "Xác thực", "ids" : "ids_VAB_withdraw_qr_step_1"},
                        {"label": "Chọn tài khoản", "ids" : "ids_VAB_withdraw_qr_step_2"},
                        {"label": "Rút tiền", "ids" : "ids_VAB_withdraw_qr_step_3"},
                        {"label": "Hoàn tất", "ids" : "ids_VAB_withdraw_qr_step_4"}
                    ]'>
            </stm-progress-bar>

            <div class="account-sections">
                <!-- Customer Info Section -->
                <div class="customer-info-section">
                    <h2 class="section-title" ids="ids_VAB_withdraw_qr_cus_info">Thông tin khách hàng</h2>
                    <div class="stm-info-card">
                        <div class="info-field">
                            <span class="info-label" ids="ids_VAB_withdraw_qr_cus_name">Tên khách hàng:</span>
                            <span class="info-value" id="cus-name">Tên khách hàng</span>
                        </div>
                        <div class="info-field">
                            <span class="info-label" ids="ids_VAB_withdraw_qr_cccd">Số CCCD/CC:</span>
                            <span class="info-value" id="cccd">Số CCCD</span>
                        </div>
                        <div class="info-field">
                            <span class="info-label" ids="ids_VAB_withdraw_qr_cif">Số CIF:</span>
                            <span class="info-value" id="cif">Số CIF</span>
                        </div>
                    </div>
                </div>

                <!-- Account Selection Layout -->
                <div class="account-selection-section">
                    <h2 class="section-title" ids="ids_VAB_withdraw_qr_please_select_account">Vui lòng chọn TKTT để rút tiền</h2>
                    <stm-list id="account-list">
                    </stm-list>
                </div>
            </div>
        </div>
    </main>

<!--    <stm-footer></stm-footer>-->
    <stm-footer-continue id="footer-continue"></stm-footer-continue>
    <stm-cancel-trans-dialog id="cancel-trans-dialog"></stm-cancel-trans-dialog>
    <input style="display: none;" id="input-val" value='{Replace input-val}' />
    <input style="display: none;" id="output-val" content='{Binding output-val mode=2}'/>
</div>
<script src="../../../js/VA/scale.js"></script>
<script>
    $(document).ready(function (){
        const headerElement = document.getElementById("auth-task-header");
        const cancelTransDialog = document.getElementById("cancel-trans-dialog");

        headerElement.onCancelTransBtnClick = function() {
            cancelTransDialog.openDialog = true
        };

		var data = '[{"id": "123456789000", "accountNumber": "123456789000", "balance": "100 000"},{"id": "987654321111", "accountNumber": "987654321111", "balance": "500 000"},{"id": "555566667777", "accountNumber": "555566667777", "balance": "250 000"},{"id": "898989328489", "accountNumber": "898989328489", "balance": "250 000"},{"id": "489384843278", "accountNumber": "489384843278", "balance": "250 000"}, {"id": "973987291832", "accountNumber": "973987291832", "balance": "250 000"}]';
		const lsData = data;
		<!-- const lsData = $('#input-val').val(); -->
		
        const accList = document.getElementById('account-list');
        const footer = document.getElementById('footer-continue');
        const cusName = document.getElementById('cus-name');
        const cccd = document.getElementById('cccd');
        const cif = document.getElementById('cif');

        accList.setAttribute('active-id', '123456789000');
        accList.setAttribute('headers', JSON.stringify([
            {"label": "Số tài khoản", "ids": "ids_VAB_withdraw_qr_account_num"},
            {"label": "Số dư", "ids": "ids_VAB_withdraw_qr_avail_balance"}
        ]));
        <!-- accList.setAttribute('accounts', JSON.stringify(data)) -->
		accList.setAttribute('accounts', lsData)
        cusName.innerText = 'ABC';
        cccd.innerText = 'Số CCCD';
        cif.innerText = 'Số CIF';

        $('#output-val').val(JSON.stringify(accList.getSelectedAccount()));

        accList.addEventListener('change', (event) => {
            const selected = event.detail.account;
            $('#output-val').val(JSON.stringify(selected));
        })


        footer.onContinueBtnClick = function () {
            console.log($('#output-val').val())
        }
    })
</script>
