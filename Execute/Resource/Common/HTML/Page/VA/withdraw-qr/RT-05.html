<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit Rules</title>
    <link rel="stylesheet" href="../../../css/VA/style.css">
    <script src="../../../js/coreScript.js"></script>
    <script src="../../../js/VA/common.js"></script>
    <script src="../../../js/VA/jquery-3.3.1.min.js"></script>
</head>
<body>
<div class="stm-layout">
    <!-- Header -->

    <stm-auth-task-header id="auth-task-header"></stm-auth-task-header>

    <!-- Body -->
    <main class="stm-body account-list-body">
        <div class="stm-content account-content">

            <stm-progress-bar
                    current-step="3"
                    steps='[
                        {"label": "Xác thực", "ids" : "ids_VAB_withdraw_qr_step_1"},
                        {"label": "Chọn tài khoản", "ids" : "ids_VAB_withdraw_qr_step_2"},
                        {"label": "Rút tiền", "ids" : "ids_VAB_withdraw_qr_step_3"},
                        {"label": "Hoàn tất", "ids" : "ids_VAB_withdraw_qr_step_4"}
                    ]'>
            </stm-progress-bar>

            <div style="text-align: center;">
                <div class="cash-value-card" ids="ids_VAB_rt_05_look_into_cam_title" style="background-color: #FFFFFF; color: black; cursor: none;">Quý khách vui lòng nhìn vào Camera phía trên</div>
            </div>

            <div class="account-sections">
                <div class="customer-info-section">
                    <h2 class="section-title" ids="ids_VAB_rt_05_face_authen_instruc_title">Hướng dẫn chụp ảnh</h2>

                    <div style="display: flex; flex-direction: column; gap: 35px;">
                        <div class="face-authen-instruction">
                            <div class="face-authen-instruc-container">
                                <img src="../../../images/VA/mask.svg">
                            </div>
                            <div class="face-authen-instruc-text">
                                <span class="info-label" style="text-align: left;" ids="ids_VAB_rt_05_take_off_mask">Tháo khẩu trang</span>
                            </div>
                        </div>

                        <div class="face-authen-instruction">
                            <div class="face-authen-instruc-container">
                                <img src="../../../images/VA/glasses.svg">
                            </div>
                            <div class="face-authen-instruc-text">
                                <span class="info-label" style="text-align: left;" ids="ids_VAB_rt_05_take_off_glasses">Tháo mắt kính</span>
                            </div>
                        </div>

                        <div class="face-authen-instruction">
                            <div class="face-authen-instruc-container">
                                <img src="../../../images/VA/helmet.svg">
                            </div>
                            <div class="face-authen-instruc-text">
                                <span class="info-label" style="text-align: left;" ids="ids_VAB_rt_05_take_off_helmet">Tháo mũ bảo hiểm</span>
                            </div>
                        </div>

                        <div>
                            <button class="btn-dialog-secondary" id="start_face_authen_btn" tag="start_face_authen_btn" type="button">
                                <span ids="ids_VAB_rt_04_confirm_withdraw_btn" ids="ids_VAB_rt_05_start_face_authen">Bắt đầu xác thực</span>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="account-selection-section" style="margin: 20px 0px;">
                    <div class="face-authen-sample-card">
                        <img src="../../../images/VA/face-authen-sample.png">
                        <div class="face-authenting-message" ids="ids_VAB_rt_05_face_authenting" id="authenting-message" style="display: none;">Đang xác thực...</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <stm-footer></stm-footer>
    <stm-cancel-trans-dialog id="cancel-trans-dialog"></stm-cancel-trans-dialog>
    <stm-one-btn-dialog id="outof-transaction-time"></stm-one-btn-dialog>
    <input style="display: none;" id="input_val" value='{Replace input_val}' />
    <input style="display: none;" id="output_val" content='{Binding output_val mode=2}'/>
</div>
<script src="../../../js/VA/scale.js"></script>
<script>
    $(document).ready(function (){
        const headerElement = document.getElementById("auth-task-header");
        // const cancelTransDialog = document.getElementById("cancel-trans-dialog");
        const startFaceAuthen = document.getElementById("start_face_authen_btn");
        const authentingMessage = document.getElementById("authenting-message");

        const countdownData = '{"countdown" : 120, "countdownCancelTrans" : 60}'
        const sampleObj = JSON.parse(countdownData);
        // const countdownData = $('#input_val').val();
        headerElement.countdownTime = sampleObj.countdown;
        headerElement.countdownCancel = sampleObj.countdownCancelTrans;



        startFaceAuthen.addEventListener('click' , () => {
            startFaceAuthen.style.backgroundColor = '#FFFFFF'
            authentingMessage.style.display = 'block'
        });

    })
</script>
</body>
</html>
