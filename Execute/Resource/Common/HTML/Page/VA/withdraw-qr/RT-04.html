<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Deposit Info</title>
    <link rel="stylesheet" href="../../../css/VA/style.css">
    <script src="../../../js/coreScript.js"></script>
    <script src="../../../js/VA/common.js"></script>
    <script src="../../../js/VA/jquery-3.3.1.min.js"></script>
</head>
<body>
<div class="stm-layout">
    <!-- Header -->

    <stm-auth-task-header></stm-auth-task-header>

    <!-- Body -->
    <main class="stm-body confirm-deposit-body">
        <div class="stm-content">
            <stm-progress-bar
                    current-step="3"
                    steps='[
                        {"label": "Xác thực", "ids" : "ids_VAB_withdraw_qr_step_1"},
                        {"label": "Chọn tài khoản", "ids" : "ids_VAB_withdraw_qr_step_2"},
                        {"label": "Rút tiền", "ids" : "ids_VAB_withdraw_qr_step_3"},
                        {"label": "Hoàn tất", "ids" : "ids_VAB_withdraw_qr_step_4"}
                    ]'>
            </stm-progress-bar>

            <div class="statement-actions-container">
                <div class="statement-actions-wrap">
                    <h2 class="section-title" ids="ids_VAB_rt_04_confirm_withdraw_info">Xác nhận thông tin rút tiền</h2>
                    <div class="statement-card">
                        <div class="statement-table statement-header">
                            <div class="statement-row">
                                <span class="statement-col" ids="ids_VAB_rt_04_account_name">Tên tài khoản</span>
                                <span class="statement-col" style="font-weight: 400;" id="account-name"></span>
                            </div>
                            <div class="statement-row">
                                <span class="statement-col" ids="ids_VAB_rt_04_account_num">Số tài khoản</span>
                                <span class="statement-col" style="font-weight: 400;" id="account-num"></span>
                            </div>
                            <div class="statement-row">
                                <span class="statement-col" ids="ids_VAB_rt_04_withdraw_amount">Số tiền rút</span>
                                <span class="statement-col" style="font-weight: 400;" id="withdraw-value"></span>
                            </div>
                            <div class="statement-row">
                                <span class="statement-col" ids="ids_VAB_rt_04_fee_amount">Số tiền phí</span>
                                <span class="statement-col" style="font-weight: 400;" id="fee-value"></span>
                            </div>
                            <div class="statement-row">
                                <span class="statement-col" ids="ids_VAB_rt_04_final_amount">Số tiền trừ vào tài khoản</span>
                                <span class="statement-col" style="font-weight: 400;" id="subtract-to-value"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="statement-btns-container">
                    <div class="dialog-actions">
                        <button class="btn-dialog-secondary" id="confirm_deposit_info" tag="confirm_deposit_info">
                            <span ids="ids_VAB_rt_04_confirm_withdraw_btn">Xác nhận</span>
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <stm-footer></stm-footer>
    <input style="display: none;" id="input-val" value='{}' />
    <input style="display: none;" id="output-val" value='{}'/>
</div>
<script src="../../../js/VA/scale.js"></script>
<script>
    $(document).ready(function (){
        const accName = document.getElementById("account-name");
        const accNum = document.getElementById("account-num");
        const withdrawVaue = document.getElementById("withdraw-value");
        const feeValue = document.getElementById("fee-value");
        const subtractToValue = document.getElementById("subtract-to-value");
        accName.innerText = 'Nguyen Van Teo';
        accNum.innerText = '09123456789';
        withdrawVaue.innerText = '6.000.000';
        feeValue.innerText = '2.200';
        subtractToValue.innerText = '6.000.000';
    })
</script>
</body>
</html>
