<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit Error</title>
    <link rel="stylesheet" href="../../../css/VA/style.css">
    <script src="../../../js/coreScript.js"></script>
    <script src="../../../js/VA/common.js"></script>
    <script src="../../../js/VA/jquery-3.3.1.min.js"></script>
</head>
<body>
<div class="stm-layout">
    <!-- Header -->

    <stm-only-logo-header></stm-only-logo-header>

    <!-- Body -->
    <main class="stm-body confirm-deposit-body">
        <div class="stm-content">
            <div class="cash-deposit-error-wrap">
               <div style="margin-top: 10vh;">
                   <div class="error-deposit-img-container">
                       <img src="../../../images/VA/icon-error.svg" width="128" height="128" style="margin: auto;">
                   </div>

                   <h2 class="cash-deposit-error-title" ids="ids_VAB_rt_01_01_account_valid_not_exist">Không tồn tại tài khoản thanh toán hợp lệ</h2>
                   <div style="text-align: center;">
                       <span class="cash-deposit-message">Vui lòng quay về Trang chủ để mở tài khoản hoặc thực hiện giao dịch khác.</span>
                   </div>
               </div>

                <span style="font-size: 25px; margin-top: 280px;" ids="ids_VAB_rt_01_01_auto_back_home_countdown" id="countdown-backto-home">
                    Tự động về màn hình Trang chủ sau <span id="Counter" type="countdown" content="{Binding Count mode=2}" visible="{Binding CounterVisible mode=2}"></span>s
                </span>

                <div class="statement-btns-container" style="margin-top: 10px;">
                    <div class="dialog-actions">
                        <button class="btn-dialog-secondary" id="confirm_deposit_info" tag="ONEXIT" type="button">
                            <span ids="ids_VAB_rt_01_01_back_home_btn">Trang chủ</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <stm-footer></stm-footer>
    <input style="display: none;" id="input_val" value='{Replace input_val}' />
    <input style="display: none;" id="output_val" content='{Binding output_val mode=2}'/>
</div>
<script src="../../../js/VA/scale.js"></script>
<script>
    $(document).ready(function (){
        // const countdownData = $('#input_val').val();
    })

</script>
</body>
</html>
