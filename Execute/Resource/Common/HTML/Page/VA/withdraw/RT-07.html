<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit Error</title>
    <link rel="stylesheet" href="../../../css/VA/style.css">
    <script src="../../../js/coreScript.js"></script>
    <script src="../../../js/VA/common.js"></script>
    <script src="../../../js/VA/jquery-3.3.1.min.js"></script>
</head>
<body>
<div class="stm-layout">
    <!-- Header -->

    <stm-auth-header-auto-back-home id="header-auto-back-home"></stm-auth-header-auto-back-home>

    <!-- Body -->
    <main class="stm-body confirm-deposit-body">
        <div class="stm-content">
            <div class="cash-deposit-error-wrap">
                <div class="error-deposit-img-container">
                    <img src="../../../images/VA/icon-error.svg" width="128" height="128" style="margin: auto;">
                </div>

                <h2 class="cash-deposit-error-title" ids="ids_VAB_rt_07_withdraw_error_title">Rút tiền không thành công</h2>
                <div class="cash-deposit-message-container" style="text-align: center;">
                    <span class="cash-deposit-message" id="cash-deposit-message"></span>
                </div>

                <div class="statement-btns-container" style="margin-top: 30vh;">
                    <span style="font-size: 25px; margin-top: 180px;" ids="ids_VAB_rt_07_auto_back_home_countdown" id="countdown-backto-home">
                        Giao dịch kết thúc sau <span id="Counter" type="countdown" content="{Binding Count mode=2}" visible="{Binding CounterVisible mode=2}"></span>
                    </span>

                    <div class="dialog-actions" style="margin-top: 60px;">
                        <button class="btn-dialog-secondary" id="end-trans" tag="ONEXIT" type="button">
                            <span ids="ids_VAB_rt_07_end_trans">Kết thúc giao dịch</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <stm-footer></stm-footer>
    <input style="display: none;" id="input_val" value='{Replace input_val}' />
    <input style="display: none;" id="output_val" content='{Binding output_val mode=2}'/>
</div>
<script src="../../../js/VA/scale.js"></script>
<script>
    $(document).ready(function (){
        const message = document.getElementById("cash-deposit-message");
        // const data = $('#input_val').val();
        const data = '{"message":"message gi do"}';
        const sampleObj = JSON.parse(data);
        message.innerText = sampleObj.message;
    })
</script>
</body>
</html>
