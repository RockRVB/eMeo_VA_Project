<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit Success</title>
    <link rel="stylesheet" href="../../../css/VA/style.css">
    <script src="../../../js/coreScript.js"></script>
    <script src="../../../js/VA/common.js"></script>
    <script src="../../../js/VA/jquery-3.3.1.min.js"></script>
</head>
<body>
<div class="stm-layout">
    <!-- Header -->

    <stm-only-logo-header></stm-only-logo-header>

    <!-- Body -->
    <main class="stm-body confirm-deposit-body">
        <div class="stm-content">
            <stm-progress-bar
                    current-step="5"
                    steps='[
                        {"label": "Xác thực", "ids" : "ids_VAB_cash_deposit_qr_step_1"},
                        {"label": "Chọn tài khoản", "ids" : "ids_VAB_cash_deposit_qr_step_2"},
                        {"label": "Nộp tiền", "ids" : "ids_VAB_cash_deposit_qr_step_3"},
                        {"label": "Hoàn tất", "ids" : "ids_VAB_cash_deposit_qr_step_4"}
                    ]'>
            </stm-progress-bar>

            <div class="statement-actions-container">
                <div class="cash-deposit-success-wrap">
                    <div class="cash-deposit-success-icon">
                        <img src="../../../images/VA/icon-success.svg">
                    </div>
                    <h2 class="cash-deposit-success-wrap-title" ids="ids_VAB_nt_08_title">Giao dịch thành công</h2>
                    <div class="statement-card">
                        <div class="statement-table statement-header">
                            <div class="statement-row">
                                <span class="statement-col" ids="ids_VAB_nt_08_receiver_account">Tài khoản thụ hưởng</span>
                                <span class="statement-col" style="font-weight: 400;" id="account-name"></span>
                            </div>
                            <div class="statement-row">
                                <span class="statement-col" ids="ids_VAB_nt_08_receiver_info">Thông tin thụ hưởng</span>
                                <span class="statement-col" style="font-weight: 400;" id="receiver-info"></span>
                            </div>
                            <div class="statement-row">
                                <span class="statement-col" ids="ids_VAB_nt_08_transaction_code">Mã giao dịch</span>
                                <span class="statement-col" style="font-weight: 400;" id="transaction-code"></span>
                            </div>
                            <div class="statement-row">
                                <span class="statement-col" ids="ids_VAB_nt_08_transaction_time">Thời gian</span>
                                <span class="statement-col" style="font-weight: 400;" id="transaction_time"></span>
                            </div>
                            <div class="statement-row">
                                <span class="statement-col" ids="ids_VAB_nt_08_deposit_amount">Số tiền nạp</span>
                                <span class="statement-col" style="font-weight: 400;" id="deposit_amount"></span>
                            </div>
                            <div class="statement-row">
                                <span class="statement-col" ids="ids_VAB_nt_08_transaction_fee">Phí giao dịch</span>
                                <span class="statement-col" style="font-weight: 400;" id="transaction_fee"></span>
                            </div>
                            <div class="statement-row">
                                <span class="statement-col" ids="ids_VAB_nt_08_final_transaction_amount">Số tiền nạp vào tài khoản</span>
                                <span class="statement-col" style="font-weight: 400;" id="final_transaction_amount"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="statement-btns-container">

                    <span style="font-size: 25px; margin-top: 180px;" ids="ids_VAB_rt_12_auto_back_home_countdown" id="countdown-end-trans" style="font-size: 18px;">
                        Giao dịch kết thúc sau <span id="Counter" type="countdown" content="{Binding Count mode=2}" visible="{Binding CounterVisible mode=2}"></span>s
                    </span>

                    <div class="dialog-actions" style="margin-top: 20px;">
                        <button class="btn-dialog-secondary" id="do_another_task_btn" tag="OnDoAnotherTask" type="button">
                            <span ids="ids_VAB_nt_08_do_another_task">Thực hiện giao dịch khác</span>
                        </button>

<!--                        <button class="btn-dialog-primary" id="print_trans_bill_btn" tag="print_trans_bill_btn">-->
<!--                            <img src="../../../images/VA/icon-printer.svg" style="margin-right: 10px;">-->
<!--                            <span ids="ids_VAB_nt_08_print_trans_bill">IN BIÊN LAI GIAO DỊCH</span>-->
<!--                        </button>-->

                        <button class="btn-dialog-secondary" id="end_transaction_btn" tag="ONEXIT" type="button">
                            <span ids="ids_VAB_nt_08_end_transaction">Kết thúc giao dịch</span>
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <stm-footer></stm-footer>   
    <input style="display: none;" id="input_val" value='{Replace input_val}' />
    <input style="display: none;" id="output_val" content='{Binding output_val mode=2}'/>
</div>
<script src="../../../js/VA/scale.js"></script>
<script>
    $(document).ready(function (){
        const accName = document.getElementById("account-name");
        const receiverInfo = document.getElementById("receiver-info");
        const transCode = document.getElementById("transaction-code");
        const transTime = document.getElementById("transaction_time");
        const depositAmount = document.getElementById("deposit_amount");
        const transFee = document.getElementById("transaction_fee");
        const finalTransAmount = document.getElementById("final_transaction_amount");

        const data = '{"deposit_successful_info":{"receive_acccount_name":"Nguyen Van Teo","receive_info":"09123456789","transaction_code":"ABC8982193","transaction_time":"2026-03-03","deposit_amount":6000000,"fee_amount":6000000,"final_amount_added":6000000}}';
        // const data = $('#input_val').val();
        const sampleObj = JSON.parse(data);

        accName.innerText = sampleObj.deposit_successful_info.receive_acccount_name;
        receiverInfo.innerText = sampleObj.deposit_successful_info.receive_info;
        transCode.innerText = sampleObj.deposit_successful_info.transaction_code;
        transTime.innerText = sampleObj.deposit_successful_info.transaction_time;
        depositAmount.innerText = formatVND(sampleObj.deposit_successful_info.deposit_amount);
        transFee.innerText = formatVND(sampleObj.deposit_successful_info.fee_amount);
        finalTransAmount.innerText = formatVND(sampleObj.deposit_successful_info.final_amount_added);

    })
</script>
</body>
</html>
