<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit Error</title>
    <link rel="stylesheet" href="../../../css/VA/style.css">
    <script src="../../../js/coreScript.js"></script>
    <script src="../../../js/VA/common.js"></script>
    <script src="../../../js/VA/jquery-3.3.1.min.js"></script>
</head>
<body>
<div class="stm-layout">
    <!-- Header -->

    <stm-only-logo-header id="header-auto-back-home"></stm-only-logo-header>

    <!-- Body -->
    <main class="stm-body confirm-deposit-body">
        <div class="stm-content">
            <div class="cash-deposit-error-wrap">
                <div class="error-deposit-img-container">
                    <img src="../../../images/VA/icon-error.svg" width="128" height="128" style="margin: auto;">
                    <h2 class="cash-deposit-error-title" ids="ids_VAB_nt_tb_03_deposit_error_title">Thông báo nhận lại tiền không hợp lệ<br>Quý khách vui lòng nhận lại tiền được trả ra từ khe nhận tiền</h2>
                    <img src="../../../images/VA/tray.png" style="margin: auto;">
                </div>

                <div>
                    <span class="cash-deposit-message" id="cash-deposit-message" ids="ids_VAB_nt_tb_03_cash_deposit_message">
                        <span ids="ids_VAB_nt_05_cancel_deposit_message_before">Hộc tiền sẽ tự động đóng sau </span>
                        <span id="Counter" type="countdown" content="{Binding Count mode=2}" visible="{Binding CounterVisible mode=2}"></span>s
                        <span ids="ids_VAB_nt_05_cancel_deposit_message_after"> và toàn bộ tiền sẽ bị giữ lại</span>
                    </span>
                </div>
            </div>
        </div>
    </main>

    <stm-footer></stm-footer>
    <input style="display: none;" id="input_val" value='{Replace input_val}' />
    <input style="display: none;" id="output_val" content='{Binding output_val mode=2}'/>
</div>
<script src="../../../js/VA/scale.js"></script>
<script>
    $(document).ready(function (){
        // const countdownData = $('#input_val').val();
    })
</script>
</body>
</html>
