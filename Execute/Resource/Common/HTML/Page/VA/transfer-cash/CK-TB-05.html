<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit Error</title>
    <link rel="stylesheet" href="../../../css/VA/style.css">
    <script src="../../../js/coreScript.js"></script>
    <script src="../../../js/VA/common.js"></script>
    <script src="../../../js/VA/jquery-3.3.1.min.js"></script>
</head>
<body>
<div class="stm-layout">
    <!-- Header -->

    <stm-only-logo-header></stm-only-logo-header>

    <!-- Body -->
    <main class="stm-body confirm-deposit-body">
        <div class="stm-content">
            <div class="cash-deposit-error-wrap">
                <div style="margin-top: 10vh;">
                    <div class="error-deposit-img-container">
                        <img src="../../../images/VA/icon-error.svg" width="128" height="128" style="margin: auto;">
                    </div>

                    <h2 class="cash-deposit-error-title" ids="ids_VAB_rt_14_title">Xác thực thất bại</h2>
                    <div style="text-align: center;">
                        <span class="cash-deposit-message" ids="ids_VAB_rt_14_subtitle">Vui lòng thực hiện xác thực lại</span>
                    </div>
                </div>


                <div class="statement-btns-container" style="margin-top: 20vh;">
                    <span style="font-size: 25px; margin-top: 180px;" ids="ids_VAB_rt_14_auto_back_home_countdown" id="countdown-end-trans">
                        Giao dịch kết thúc sau <span id="Counter" type="countdown" content="{Binding Count mode=2}" visible="{Binding CounterVisible mode=2}"></span>s
                    </span>
                    <div class="dialog-actions" style="margin-top: 60px;">
                        <button class="btn-dialog-primary" id="end-trans" tag="ONEXIT" type="button">
                            <span ids="ids_VAB_rt_14_end_transaction">Kết thúc giao dịch</span>
                        </button>

                        <button class="btn-dialog-secondary" id="re-authen" tag="OnReFaceAuthen" type="button">
                            <span ids="ids_VAB_rt_14_re_authentication">Xác thực lại</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <stm-footer></stm-footer>
    <input style="display: none;" id="input_val" value='{Replace input_val}' />
    <input style="display: none;" id="output_val" content='{Binding output_val mode=2}'/>
</div>
<script src="../../../js/VA/scale.js"></script>
<script>
    $(document).ready(function (){
        // const countdownData = $('#input_val').val();

    })

</script>
</body>
</html>
