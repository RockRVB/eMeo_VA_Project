<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Deposit Info</title>
    <link rel="stylesheet" href="../../../css/VA/style.css">
    <script src="../../../js/coreScript.js"></script>
    <script src="../../../js/VA/common.js"></script>
    <script src="../../../js/VA/jquery-3.3.1.min.js"></script>
</head>
<body>
<div class="stm-layout">
    <!-- Header -->
    <stm-cancel-trans-dialog id="cancel-trans-dialog"></stm-cancel-trans-dialog>
    <stm-one-btn-dialog id="outof-transaction-time"></stm-one-btn-dialog>
    <stm-auth-task-header id="auth-task-header"></stm-auth-task-header>

    <!-- Body -->
    <main class="stm-body confirm-deposit-body">
        <div class="stm-content">
            <stm-progress-bar
                    current-step="3"
                    steps='[
                        {"label": "Xác thực", "ids" : "ids_VAB_cash_deposit_qr_step_1"},
                        {"label": "Chọn tài khoản", "ids" : "ids_VAB_cash_deposit_qr_step_2"},
                        {"label": "Nộp tiền", "ids" : "ids_VAB_cash_deposit_qr_step_3"},
                        {"label": "Hoàn tất", "ids" : "ids_VAB_cash_deposit_qr_step_4"}
                    ]'>
            </stm-progress-bar>

            <div class="statement-actions-container">
                <div class="statement-actions-wrap">
                    <h2 class="section-title" ids="ids_VAB_ck_tm_12_title">Xác nhận thông tin nộp tiền</h2>
                    <div class="statement-card">
                        <div class="statement-table statement-header">
                            <div class="statement-row">
                                <span class="statement-col" ids="ids_VAB_ck_tm_12_account_name">Tên tài khoản thụ hưởng</span>
                                <span class="statement-col" style="font-weight: 400;" id="account-name"></span>
                            </div>
                            <div class="statement-row">
                                <span class="statement-col" ids="ids_VAB_ck_tm_12_account_num">Số tài khoản thụ hưởng</span>
                                <span class="statement-col" style="font-weight: 400;" id="account-num"></span>
                            </div>
                            <div class="statement-row">
                                <span class="statement-col" ids="ids_VAB_ck_tm_12_deposit_amount">Số tiền nạp</span>
                                <span class="statement-col" style="font-weight: 400;" id="deposit-value"></span>
                            </div>
                            <div class="statement-row">
                                <span class="statement-col" ids="ids_VAB_ck_tm_12_fee_amount">Số tiền phí</span>
                                <span class="statement-col" style="font-weight: 400;" id="fee-value"></span>
                            </div>
                            <div class="statement-row">
                                <span class="statement-col" ids="ids_VAB_ck_tm_12_final_amount">Số tiền nạp vào tài khoản</span>
                                <span class="statement-col" style="font-weight: 400;" id="final-deposit-value"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="statement-btns-container">
                    <div class="dialog-actions">
                        <button class="btn-dialog-secondary" id="confirm_deposit_info" tag="OnConfirmDepositInfo" type="button">
                            <span ids="ids_VAB_ck_tm_12_confirm_deposit_info">Xác nhận</span>
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <stm-footer></stm-footer>
    <input style="display: none;" id="input_val" value='{Replace input_val}' />
    <input style="display: none;" id="output_val" content='{Binding output_val mode=2}'/>
</div>
<script src="../../../js/VA/scale.js"></script>
<script>
    $(document).ready(function (){
        const accName = document.getElementById("account-name");
        const accNum = document.getElementById("account-num");
        const depositValue = document.getElementById("deposit-value");
        const feeValue = document.getElementById("fee-value");
        const finalDepositVal = document.getElementById("final-deposit-value");
        accName.innerText = 'Nguyen Van Teo';
        accNum.innerText = '09123456789';
        depositValue.innerText = '6.000.000';
        feeValue.innerText = '2.200';
        finalDepositVal.innerText = '6.000.000';


        const data = '{"confirm_deposit_info":{"account_name":"Nguyen Van Teo","account_num":"09123456789","deposit_value":6000000,"fee_value":2200,"final_deposit_val":6000000}}';
        <!-- const data = $('#input_val').val(); -->

        const sampleObj = JSON.parse(data);

        accName.innerText = sampleObj.confirm_deposit_info.account_name;
        accNum.innerText = sampleObj.confirm_deposit_info.account_num;
        depositValue.innerText = formatVND(sampleObj.confirm_deposit_info.deposit_value);
        feeValue.innerText = formatVND(sampleObj.confirm_deposit_info.fee_value);
        finalDepositVal.innerText = formatVND(sampleObj.confirm_deposit_info.final_deposit_val);

    })
</script>
</body>
</html>
