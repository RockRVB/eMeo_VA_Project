<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash Deposit Slip</title>
    <link rel="stylesheet" href="../../../css/VA/style.css">
    <script src="../../../js/coreScript.js"></script>
    <script src="../../../js/VA/common.js"></script>
    <script src="../../../js/VA/qrcode.min.js"></script>
    <script src="../../../js/VA/jquery-3.3.1.min.js"></script>
</head>
<body>
<div class="stm-layout">
    <!-- Header -->
    <stm-cancel-trans-dialog id="cancel-trans-dialog"></stm-cancel-trans-dialog>
    <stm-one-btn-dialog id="outof-transaction-time"></stm-one-btn-dialog>
    <stm-auth-task-header id="auth-task-header"></stm-auth-task-header>

    <!-- Body -->
    <main class="stm-body confirm-deposit-body">
        <div class="stm-content">
            <stm-progress-bar
                    id="progressBar"
                    current-step="1"
                    >
            </stm-progress-bar>

            <div class="statement-actions-container">
                <div class="statement-actions-wrap">
                    <h2 class="section-title" ids="ids_VAB_xt_qr_02_title">Vui lòng đăng nhập ứng dụng VAB của bạn để quét mã QR</h2>

                    <div class="qr-container">
                        <div id="qrcode" class="qr-code"></div>
                    </div>
                </div>

<!--                <div style="display: flex; flex-direction: row; gap: 50px;">-->
<!--                    <span style="font-size: 25px;" ids="ids_VAB_xt_qr_02_countdown_update_qr" id="countdown-update-qr"></span>-->

<!--                    <button style="background: transparent; border: none; cursor: pointer;" type="button">-->
<!--                        <span style="font-size: 22px; color: #67E3F9;" ids="ids_VAB_xt_qr_02_update_qr_btn" id="update-qr-btn">Cập nhật</span>-->
<!--                    </button>-->
<!--                </div>-->

            </div>

        </div>
    </main>

    <stm-footer></stm-footer>
    <input style="display: none;" id="input_val" value='{Replace input_val}' />
        <input style="display: none;" id="output_val" content='{Binding output_val mode=2}'/>
</div>
<script src="../../../js/VA/scale.js"></script>
<script type="text/javascript">
    $(document).ready(function(){
        //const masterDataStr = `{ "qr_code": "https://google.com", "transaction_type": "CashTransfer_NoCard"}`;
        const masterDataStr = $('#input_val').val(); 
        const masterData = JSON.parse(masterDataStr);
        const progressList = {
            "CashWithdrawal_NoCard": [
                {"label": "Xác thực", "ids" : "ids_VAB_withdraw_qr_step_1"},
                {"label": "Chọn tài khoản", "ids" : "ids_VAB_withdraw_qr_step_2"},
                {"label": "Rút tiền", "ids" : "ids_VAB_withdraw_qr_step_3"},
                {"label": "Hoàn tất", "ids" : "ids_VAB_withdraw_qr_step_4"}
            ],
            "Deposit_NoCard":[
                {"label": "Xác thực", "ids" : "ids_VAB_cash_deposit_qr_step_1"},
                {"label": "Chọn tài khoản", "ids" : "ids_VAB_cash_deposit_qr_step_2"},
                {"label": "Nộp tiền", "ids" : "ids_VAB_cash_deposit_qr_step_3"},
                {"label": "Hoàn tất", "ids" : "ids_VAB_cash_deposit_qr_step_4"}
            ],
            "CashTransfer_NoCard":[
                {"label": "Xác thực", "ids" : "ids_VAB_transfer_tktt_step_1"},
                {"label": "Chọn tài khoản", "ids" : "ids_VAB_transfer_tktt_step_2"},
                {"label": "Chuyển tiền", "ids" : "ids_VAB_transfer_tktt_step_3"},
                {"label": "Hoàn tất", "ids" : "ids_VAB_transfer_tktt_step_4"}
            ],
            "Transfer_NoCard": [
                {"label": "Xác thực", "ids" : "ids_VAB_transfer_tm_step_1"},
                {"label": "Chọn tài khoản", "ids" : "ids_VAB_transfer_tm_step_2"},
                {"label": "Nộp tiền", "ids" : "ids_VAB_transfer_tm_step_3"},
                {"label": "Chuyển tiền", "ids" : "ids_VAB_transfer_tm_step_4"},
                {"label": "Hoàn tất", "ids" : "ids_VAB_transfer_tm_step_5"}

        }

        $("#progressBar").attr("steps", JSON.stringify(progressList[masterData.transaction_type]))

        var qrcode = new QRCode(document.getElementById("qrcode"), {
            text: masterData.QR_Code,
            width: 400,
            height: 400,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

</html>
