<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash Deposit Slip</title>
    <link rel="stylesheet" href="../../../css/VA/style.css">
    <script src="../../../js/coreScript.js"></script>
    <script src="../../../js/VA/common.js"></script>
    <script src="../../../js/VA/qrcode.min.js"></script>
    <script src="../../../js/VA/jquery-3.3.1.min.js"></script>
</head>
<body>
<div class="stm-layout">
    <!-- Header -->

    <stm-auth-task-header id="auth-task-header"></stm-auth-task-header>

    <!-- Body -->
    <main class="stm-body confirm-deposit-body">
        <div class="stm-content">
            <stm-progress-bar
                    current-step="1"
                    steps='[
                        {"label": "Xác thực", "ids" : "ids_VAB_cash_deposit_qr_step_1"},
                        {"label": "Chọn tài khoản", "ids" : "ids_VAB_cash_deposit_qr_step_2"},
                        {"label": "Nộp tiền", "ids" : "ids_VAB_cash_deposit_qr_step_3"},
                        {"label": "Hoàn tất", "ids" : "ids_VAB_cash_deposit_qr_step_4"}
                    ]'>
            </stm-progress-bar>

            <div class="statement-actions-container">
                <div class="statement-actions-wrap">
                    <h2 class="section-title" ids="ids_VAB_xt_qr_02_title">Vui lòng đăng nhập ứng dụng VAB của bạn để quét mã QR</h2>

                    <div class="qr-container">
                        <div id="qrcode" class="qr-code"></div>
                    </div>
                </div>

                <div style="display: flex; flex-direction: row; gap: 50px;">
                    <span style="font-size: 25px;" ids="ids_VAB_xt_qr_02_countdown_update_qr" id="countdown-update-qr"></span>

                    <button style="background: transparent; border: none; cursor: pointer;">
                        <span style="font-size: 22px; color: #67E3F9;" ids="ids_VAB_xt_qr_02_update_qr_btn" id="update-qr-btn">Cập nhật</span>
                    </button>
                </div>

            </div>

        </div>
    </main>

    <stm-footer></stm-footer>
    <stm-cancel-trans-dialog id="cancel-trans-dialog"></stm-cancel-trans-dialog>
    <input style="display: none;" id="input-val" value='{}' />
    <input style="display: none;" id="output-val" value='{}'/>
</div>
<script src="../../../js/VA/scale.js"></script>
<script type="text/javascript">
    $(document).ready(function(){
        const headerElement = document.getElementById("auth-task-header");
        const cancelTransDialog = document.getElementById("cancel-trans-dialog");

        headerElement.onCancelTransBtnClick = function() {
            cancelTransDialog.openDialog = true
        };

        var qrcode = new QRCode(document.getElementById("qrcode"), {
            text: "https://google.com",
            width: 400,
            height: 400,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        const countdownText = document.getElementById("countdown-update-qr");

        let timeLeft = 180;
        countdownText.innerText = `Tự động cập nhật sau ${timeLeft}s`
        const timer = setInterval(() => {
            timeLeft--;

            countdownText.innerText = `Tự động cập nhật sau ${timeLeft}s` ;

            if (timeLeft <= 0) {
                clearInterval(timer);
            }
        }, 1000);
    });
</script>
</body>
</html>
