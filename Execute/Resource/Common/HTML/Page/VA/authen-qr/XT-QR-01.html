<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer Group</title>
    <link rel="stylesheet" href="../../../css/VA/style.css">
    <script src="../../../js/coreScript.js"></script>
    <script src="../../../js/VA/common.js"></script>
    <script src="../../../js/VA/jquery-3.3.1.min.js"></script>
</head>
<body>
    <div class="stm-layout">
        <!-- Header -->

        <stm-auth-task-header id="auth-task-header"></stm-auth-task-header>

        <!-- Body -->
        <main class="stm-body transfer-body">
            <div class="stm-content">

                <h2 class="stm-subtitle" ids="ids_VAB_xt_qr_01_choose_authen_method">Quý khách vui lòng chọn phương thức xác thực</h2>

                <!-- Large Cards Flex Container -->
                <div class="stm-large-cards" style="margin-top: 150px;">
                    <!-- Card 1 -->
                    <div class="stm-card-lg" id="qr-code-method" tag="OnQR" type="button">
                        <stm-card
                                icon-url="../../../images/VA/qr.svg"
                                title="QR Code"
                                ids="ids_VAB_xt_qr_01_qr_code_method"
                        >
                        </stm-card>
                    </div>
                    <div class="stm-card-lg" id="cccd-method" tag="OnCCCD" type="button">
                        <stm-card
                                icon-url="../../../images/VA/id-card.png"
                                title="Căn cước công dân"
                                ids="ids_VAB_xt_qr_01_cccd_method"
                        >
                        </stm-card>
                    </div>
                </div>

            </div>
        </main>

        <stm-footer></stm-footer>
        <stm-cancel-trans-dialog id="cancel-trans-dialog"></stm-cancel-trans-dialog>
        <stm-one-btn-dialog id="outof-transaction-time"></stm-one-btn-dialog>
        <input style="display: none;" id="input_val" value='{Replace input_val}' />
        <input style="display: none;" id="output_val" content='{Binding output_val mode=2}'/>
    </div>
    <script src="../../../js/VA/scale.js"></script>
</body>
<script>
    $(document).ready(function() {
        const header = document.getElementById("auth-task-header");
        const countdownData = '{"countdown" : 60, "countdownCancelTrans" : 60}'
        const sampleObj = JSON.parse(countdownData);
        // const countdownData = $('#input_val').val();
        header.countdownTime = sampleObj.countdown;
        header.countdownCancel = sampleObj.countdownCancelTrans;
    })
</script>
</html>
