<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash Deposit Slip</title>
    <link rel="stylesheet" href="../../../css/VA/style.css">
    <script src="../../../js/coreScript.js"></script>
    <script src="../../../js/VA/common.js"></script>
    <script src="../../../js/VA/jquery-3.3.1.min.js"></script>
</head>
<body>
<div class="stm-layout">
    <!-- Header -->

    <stm-auth-task-header id="auth-task-header"></stm-auth-task-header>

    <!-- Body -->
    <main class="stm-body confirm-deposit-body">
        <div class="stm-content">
            <stm-progress-bar
                    current-step="3"
                    steps='[
                        {"label": "Xác thực", "ids" : "ids_VAB_cash_deposit_qr_step_1"},
                        {"label": "Chọn tài khoản", "ids" : "ids_VAB_cash_deposit_qr_step_2"},
                        {"label": "Nộp tiền", "ids" : "ids_VAB_cash_deposit_qr_step_3"},
                        {"label": "Hoàn tất", "ids" : "ids_VAB_cash_deposit_qr_step_4"}
                    ]'>
            </stm-progress-bar>

            <div class="statement-actions-container">
                <div class="statement-actions-wrap">
                    <h2 class="section-title" ids="ids_VAB_nt_04_title">Vui lòng xác nhận bảng kê</h2>
                    <!--                    <stm-table-->
                    <!--                            headers='[-->
                    <!--                                {"label": "Mệnh giá", "field": "price"},-->
                    <!--                                {"label": "Số lượng", "field": "qty"},-->
                    <!--                                {"label": "Thành tiền", "field": "amount"}-->
                    <!--                            ]'-->
                    <!--                            data='[-->
                    <!--                                {"price": "20,000 VNĐ", "qty": 5, "amount": "100,000 VNĐ"},-->
                    <!--                                {"price": "50,000 VNĐ", "qty": 2, "amount": "100,000 VNĐ"},-->
                    <!--                                {"price": "500,000,000 VNĐ", "qty": 2, "amount": "100,000,000 VNĐ"},-->
                    <!--                                {"price": "500,000,000 VNĐ", "qty": 2, "amount": "100,000,000 VNĐ"},-->
                    <!--                                {"price": "500,000,000 VNĐ", "qty": 2, "amount": "100,000,000 VNĐ"},-->
                    <!--                                {"price": "500,000,000 VNĐ", "qty": 2, "amount": "100,000,000 VNĐ"},-->
                    <!--                                {"price": "500,000,000 VNĐ", "qty": 2, "amount": "100,000,000 VNĐ"}-->
                    <!--                            ]'-->
                    <!--                    >-->
                    <!--                    </stm-table>-->
                    <div class="statement-card">
                        <div class="statement-table statement-header">
                            <div class="statement-row">
                                <span class="statement-col" ids="ids_VAB_nt_04_menh_gia">Mệnh giá</span>
                                <span class="statement-col" ids="ids_VAB_nt_04_sl">Số lượng</span>
                                <span class="statement-col" ids="ids_VAB_nt_04_thanh_tien">Thành tiền</span>
                            </div>
                        </div>
                        <div class="statement-table statement-data" id="table-data">
                        </div>

                        <div class="statement-divider"></div>

                        <div class="statement-table statement-total">
                            <div class="statement-row">
                                <span class="statement-col" ids="ids_VAB_nt_04_total_label">Tổng</span>
                                <span class="statement-col"></span>
                                <span class="statement-col" id="total-value"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="statement-btns-container">
                    <div class="dialog-actions">
                        <button class="btn-dialog-primary" id="extra_deposit" tag="extra_deposit">
                            <span ids="ids_VAB_nt_04_add_on_deposit">Nộp thêm</span>
                        </button>

                        <button class="btn-dialog-secondary" id="confirm_deposit" tag="confirm_deposit">
                            <span ids="ids_VAB_nt_04_confirm_deposit">Xác nhận</span>
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <stm-footer></stm-footer>
    <stm-cancel-trans-dialog id="cancel-trans-dialog"></stm-cancel-trans-dialog>
    <input style="display: none;" id="input-val" value='{}' />
    <input style="display: none;" id="output-val" value='{}'/>
</div>
<script src="../../../js/VA/scale.js"></script>
<script>
    $(document).ready(function (){
        const container = document.getElementById('table-data');
        const totalSpan = document.getElementById('total-value');

        function calculateGrandTotal(dataArray) {
            const grandTotal = dataArray.reduce((accumulator, item) => {
                const numericValue = parseInt(item.total.replace(/,/g, '').replace(' VNĐ', ''));
                return accumulator + numericValue;
            }, 0);
            return grandTotal.toLocaleString('vi-VN') + " VNĐ";
        }

        const data = [
            { price: "20,000 VNĐ", quantity: "5", total: "100,000 VNĐ" },
            { price: "50,000 VNĐ", quantity: "5", total: "250,000 VNĐ" },
            { price: "100,000 VNĐ", quantity: "5", total: "500,000 VNĐ" },
            { price: "200,000 VNĐ", quantity: "5", total: "1,000,000 VNĐ" },
            { price: "500,000 VNĐ", quantity: "5", total: "2,500,000 VNĐ" }
        ];


        data.forEach(item => {
            // Tạo div class "statement-row"
            const row = document.createElement('div');
            row.className = 'statement-row';
            const cols = [item.price, item.quantity, item.total];

            cols.forEach(text => {
                const span = document.createElement('span');
                span.className = 'statement-col';
                span.textContent = text;
                row.appendChild(span);
            });

            container.appendChild(row);
        });

        totalSpan.innerText = calculateGrandTotal(data);

        const headerElement = document.getElementById("auth-task-header");
        const cancelTransDialog = document.getElementById("cancel-trans-dialog");

        headerElement.onCancelTransBtnClick = function() {
            cancelTransDialog.openDialog = true
        };
    })
</script>
</body>
</html>
