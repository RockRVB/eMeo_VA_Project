<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cancel Deposit</title>
    <link rel="stylesheet" href="../../../css/VA/style.css">
    <script src="../../../js/coreScript.js"></script>
    <script src="../../../js/VA/common.js"></script>
    <script src="../../../js/VA/jquery-3.3.1.min.js"></script>
</head>
<body>
<div class="stm-layout">
    <!-- Header -->

    <stm-auth-header-auto-back-home></stm-auth-header-auto-back-home>

    <!-- Body -->
    <main class="stm-body confirm-deposit-body">
        <div class="stm-content">
            <div class="cash-deposit-error-wrap">
                <div class="cancel-deposit-img-container">
                    <img src="../../../images/VA/icon-error.svg" width="128" height="128" style="margin: auto;">
                    <img src="../../../images/VA/tray.png" style="margin: auto;">
                </div>

                <h2 class="cash-deposit-error-title" ids="ids_VAB_nt_05_cancel_deposit_title">Giao dịch đã hủy <br>Quý khách vui lòng nhận tiền từ khay</h2>
                <div>
                    <span class="cash-deposit-message" id="cancel-deposit-message" ids="ids_VAB_nt_05_cancel_deposit_message">Hộc tiền sẽ tự động đóng sau 120s và toàn bộ tiền sẽ bị giữ lại</span>
                </div>
            </div>
        </div>
    </main>

    <stm-footer></stm-footer>
    <input style="display: none;" id="input-val" value='{}' />
    <input style="display: none;" id="output-val" value='{}'/>
</div>
<script src="../../../js/VA/scale.js"></script>
<script>
    $(document).ready(function (){
        const messageSpan = document.getElementById('cancel-deposit-message');

        let timeLeft = 120;
        messageSpan.innerText = `Hộc tiền sẽ tự động đóng sau ${timeLeft}s và toàn bộ tiền sẽ bị giữ lại`
        const timer = setInterval(() => {
            timeLeft--;

            messageSpan.innerText = `Hộc tiền sẽ tự động đóng sau ${timeLeft}s và toàn bộ tiền sẽ bị giữ lại` ;

            if (timeLeft <= 0) {
                clearInterval(timer);
            }
        }, 1000);
    })

</script>
</body>
</html>
