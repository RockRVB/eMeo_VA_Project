<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit Error</title>
    <link rel="stylesheet" href="../../../css/VA/style.css">
    <script src="../../../js/coreScript.js"></script>
    <script src="../../../js/VA/common.js"></script>
    <script src="../../../js/VA/jquery-3.3.1.min.js"></script>
</head>
<body>
<div class="stm-layout">
    <!-- Header -->

    <stm-auth-header-auto-back-home id="header-auto-back-home"></stm-auth-header-auto-back-home>

    <!-- Body -->
    <main class="stm-body confirm-deposit-body">
        <div class="stm-content">
            <div class="cash-deposit-error-wrap">
                <div class="error-deposit-img-container">
                    <img src="../../../images/VA/icon-error.svg" width="128" height="128" style="margin: auto;">
                    <h2 class="cash-deposit-error-title" ids="ids_VAB_nt_07_deposit_error_title">Nạp tiền không thành công<br>Quý khách vui lòng nhận tiền từ khay</h2>
                    <img src="../../../images/VA/tray.png" style="margin: auto;">
                </div>

                <div>
                    <span class="cash-deposit-message" id="cash-deposit-message" ids="ids_VAB_nt_07_cash_deposit_message">Hộc tiền sẽ tự động đóng sau 120s và toàn bộ tiền sẽ bị giữ lại</span>
                </div>
            </div>
        </div>
    </main>

    <stm-footer></stm-footer>
    <input style="display: none;" id="input_val" value='{Replace input_val}' />
    <input style="display: none;" id="output_val" content='{Binding output_val mode=2}'/>
</div>
<script src="../../../js/VA/scale.js"></script>
<script>
    $(document).ready(function (){
        const messageSpan = document.getElementById("cash-deposit-message");
        const header = document.getElementById("header-auto-back-home");

        const countdownData = '{"countdown" : 120}'
        let sampleObj = JSON.parse(countdownData);
        // const countdownData = $('#input_val').val();

        header.countdownVal = sampleObj.countdown;
        messageSpan.innerText = `Hộc tiền sẽ tự động đóng sau ${sampleObj.countdown}s và toàn bộ tiền sẽ bị giữ lại`
        const timer = setInterval(() => {
            sampleObj.countdown--;

            messageSpan.innerText = `Hộc tiền sẽ tự động đóng sau ${sampleObj.countdown}s và toàn bộ tiền sẽ bị giữ lại` ;

            if (sampleObj.countdown <= 0) {
                clearInterval(timer);
            }
        }, 1000);

    })
</script>
</body>
</html>
