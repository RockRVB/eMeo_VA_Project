<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script src="../../js/vue.min.js"></script>
  <script src="../../js/grg-ui.min.js"></script>
  <script src="../../js/vue-i18n.js"></script>
  <script src="../../js/jquery-3.7.0.js"></script>	<script src="../../js/class/layer/layer.js"></script>	<script src="../../js/index.js"></script>
  <script src="../../js/coreScript.js"></script>
  <script src="../../js/ibank.js"></script>
  <link rel="stylesheet" href="../../css/grg-ui.min.css">
  <link rel="stylesheet" href="../../css/animate.grg.css">
  <link rel="stylesheet" href="../../css/ibank.css">
  <style>
    .grg-main {
      display: flex;
      justify-content: space-between;
      visibility: hidden;
    }

    .main-content-box {
      width: 100%;
      text-align: center;
    }

    .thank-you-img {
      position: absolute;
      left: 50%;
      top: 65%;
      transform: translate(-50%, -65%);
    }

    .key-input {
			text-align: center;
      width: 1000px;
      height: 98px;
      background: #FFFFFF;
      border-radius: 8px;
      border: 2px solid #296CFF;
      font-size: 40px;
      font-family: 'Alibaba Sans';
      font-weight: 500;
      color: #296CFF;
      margin-top: 36px;
		}
  </style>
</head>

<body>
  <div id="app">
    <div id="grg-header" class="grg-header">
    </div>
    <div id="grg-main" class="grg-main animate_grg_fadeInRight">
      <!-- <div class="count-down">
        <div class="count-down-2">60</div>
      </div> -->
      <div class="main-content-box">
        <div class="title" ids="ids_epp_GetPawwordA">Please Input Key-A Password</div>
        <input class='key-input' type='text' value='123' disabled id="keyvalue" content="{Binding Password}" content='{Binding Password mode=2}' format="#### "/>
        <img class="thank-you-img" src="../../images/img_2.4/key_img.png" alt="">
        <div class="button-box only-page-button-box">
          <div class="grg-btn grg-cancel" id="F6" type='button' tag="OnCancel" ids='ids_Btn_cancel'>
            <img class="icon-img" src="../../images/img_2.4/icon-cancel.png" alt="">Cancel
          </div>
          <div class="grg-btn grg-confirm" id="F4" type='button' tag="OnClear" ids='ids_Btn_reset'>
            <img class="icon-img" src="../../images/img_2.4/icon-resend.png" alt="">Reset
          </div>
		  <div class="grg-btn grg-confirm" id="F8" type='button' tag="OnConfirm" ids='ids_Btn_confirm'>
            <img class="icon-img" src="../../images/img_2.4/icon-ok.png" alt="">Confirm
          </div>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
