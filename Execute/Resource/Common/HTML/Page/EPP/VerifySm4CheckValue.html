<body>
<div class="backgroundDiv">
  <div style=" position:absolute;text-align:center; width:100%; margin-top:100px;">
    <img replace="1" srcKey="EPPInputGuide" />
  </div>
  <div class="mainDivOneLine" ids="IDS_VerifyCheckValue" style="margin-bottom:20px;margin-top:400px"></div>

	<input class="inputTextCenterAlign" id="checkvalue" content="{Binding InputCheckValue}" type="text" size="25"  />
  </div>
  <div class="f4Div" id="F4" tag="OnClear" type="Button"> <img src="../../../Image/CN/Btn_Bg3_right_up.png" id="bgimg" up="(btnbg3rightup)" down="(btnbg3rightdw)" /> <span class="buttonRight" ids="IDS_Clear"></span> </div>
  <div class="f8Div" id="F8" tag="OnCancel" type="Button"> <img src="../../../Image/CN/Btn_Bg2_right_up.png" id="bgimg" up="(btnbg2rightup)" down="(btnbg2rightdw)" /> <span class="buttonRight" ids="IDS_Cancel"></span> </div>
</div>
