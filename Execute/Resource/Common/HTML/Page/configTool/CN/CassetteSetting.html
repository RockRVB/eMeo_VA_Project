        //<!--控件命名规则为Input+类型+序号或Select+类型+序号-->
        function Actived(string) {
            var p0 = string;
            var p1 = document.getElementById('Input' + p0 + 1);
            var p2 = document.getElementById('Input' + p0 + 6);
            var p4 = document.getElementById('Select' + p0 + 1);
            var p5 = document.getElementById(p0);

            if (p5.checked) {
                p1.disabled = false;
                p4.disabled = false;
                p2.value = "1";
            }
            else {
                p1.disabled = true;
                p4.disabled = true;
                p2.value = "0";
            }

        }

        //<!--页面加载事件，判断是否置灰，判断enabled类型-->
        function Load() {
            for (var i = 1; i <= 8; i++) {
                var p0 = document.getElementById('Input' + i + 4);
                var p1 = document.getElementById('Select' + i + 1);
                var p3 = document.getElementById('Select' + i + 2);
                var p4 = document.getElementById('Input' + i + 1);
                var p5 = document.getElementById(i);
                var p6 = document.getElementById('Input' + i + 6);

                var p50 = document.getElementById('Hidden' + p0.value + 2);
                var p60 = document.getElementById('Hidden' + p0.value + 1);
                var p70 = document.getElementById('Hidden' + p0.value + 3);
                var p51 = document.getElementById('Input' + i + 2);
                var p61 = document.getElementById('Input' + i + 3);
                var p71 = document.getElementById('Select' + i + 2);

                if (p4.value != "") {

                    if (p6.value == "1") {
                        p1.disabled = false;
                        p4.disabled = false;
                        p5.checked = true;
                    }
                    else {
                        p5.checked = false;
                    }
                    if (p70.value == "1")
                        p71.selectedIndex = 0;
                    else
                        p71.selectedIndex = 1;
                }
                else {
                    p1.disabled = true;
                    p4.disabled = true;
                    p51.disabled = true;
                    p61.disabled = true;
                    p5.checked = false;

                }
                if (p0.value != "") {
                    p51.value = p50.value;
                    p61.value = p60.value;
                    p71.value = p70.value;
                    p1.selectedIndex = p0.value - 1;

                }
            }
        }

        function UpdateMapSetting() {
            var p0;
            var p1;
            for (i = 1; i <= 8; i++) {
                p0 = document.getElementById('Input' + i + 4);
                p1 = document.getElementById('Select' + i + 1);
                p2 = document.getElementById('Input' + i + 1);
                p3 = document.getElementById('Input' + i + 5);
                p4 = document.getElementById('Input' + i + 6);
                p5 = document.getElementById(i);
                if (p2.value == "") {
                    p4.value = "0";
                }
                else if (p5.checked) {
                    p0.value = p1.selectedIndex + 1;
                    p4.value = "1";
                }
                p3.value = p2.value;
            }
        }

        function Bind(string2) {

            var p5 = document.getElementById('Hidden' + string2 + 2);
            var p6 = document.getElementById('Hidden' + string2 + 1);
            var p7 = document.getElementById('Hidden' + string2 + 3);
            var p51 = document.getElementById('Input' + string2 + 2);
            var p61 = document.getElementById('Input' + string2 + 3);
            var p71 = document.getElementById('Select' + string2 + 2);

            p51.value = p5.value;
            p61.value = p6.value;
            if (p7.value == "1")
                p71.selectedIndex = 0;
            else
                p71.selectedIndex = 1;
        }


        function Update(string1) {
            var p1 = document.getElementById('Input' + string1 + 4);
            var p2 = document.getElementById('Select' + string1 + 1);
            var p3 = document.getElementById('Input' + string1 + 5);
            var p4 = document.getElementById('Input' + string1 + 1);

            p1.value = p2.selectedIndex + 1;
            p3.value = p4.value;

            var p5 = document.getElementById('Hidden' + p1.value + 2);
            var p6 = document.getElementById('Hidden' + p1.value + 1);
            var p7 = document.getElementById('Hidden' + p1.value + 3);
            var p51 = document.getElementById('Input' + string1 + 2);
            var p61 = document.getElementById('Input' + string1 + 3);
            var p71 = document.getElementById('Select' + string1 + 2);

            var p0 = document.getElementById('Input' + string1 + 6);

            p51.value = p5.value;
            p61.value = p6.value;
            if (p7.value == "1")
            { p71.selectedIndex = 0; }
            else
            { p71.selectedIndex = 1; }

            p0.value = p7.value;
        }
