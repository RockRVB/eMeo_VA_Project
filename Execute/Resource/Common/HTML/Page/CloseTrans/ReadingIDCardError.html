<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
		<title>身份证读取失败，是否重新读取</title>
		<link rel="stylesheet" type="text/css" href="../../css/CN.css"  replace="1"/>
		<script src="../../js/require.js" type="text/javascript" charset="utf-8" data-main="../../js/main" async="true"></script>
	</head>
	<body class="all_bg">
		<header class="index_top clear">
			<div class="logo"></div>
			<div class="index_top_title">
				<div class="count_down_time" style="display:none" id="Counter" type="countdown" content="{Binding Count}" visible="{Binding CouterVisible}">10</div>
			</div>
		</header>
		<div class="ibank_container">
			<div class="business_container">
				<div class="error_result">
					<div ids="IDS_ReadingIDCardError">身份证读取失败，是否重新读取</div>
				</div>
			</div>
			<div class="button_container unabletoprint_button">
				<div class="cancel_button"  ids="IDS_NO" id="btnNo" type="Button" tag="OnCancel">否</div>
				<div class="enter_button"  ids="IDS_YES" id="btnConfirm" type="Button" tag="OnContinue">是</div>
			</div>
		</div>
	</body>
</html>
