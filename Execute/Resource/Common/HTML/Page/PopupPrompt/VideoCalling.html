<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
		<title>坐席呼叫中...</title>
		<link rel="stylesheet" type="text/css" href="../../css/CN.css"/>
		<script type="text/javascript">
            var time = 59,counter=null;
            function settime() {
                if (time != 0) {
                    time--;
                }
				else{
					clearInterval(counter);
					window.external.PopupEventRaised('ShowTimeOut');
				}	
                document.getElementById("Counter").innerText = time;
            }
            
            window.onload = function(){
				
				counter=setInterval(function () {
					settime();
				}, 1000)
			};
		</script>
	</head>
	<body class="all_bg">
		<header class="index_top clear">
			<div class="logo"></div>
			<div class="index_top_title">
				<div class="count_down_time" id="Counter" type="countdown" content="{Binding Count}" visible="{Binding CouterVisible}">59</div>
			</div>
		</header>
		<div class="ibank_container">
			<div class="business_container">
				<div class="waiting_contain">
					
				</div>
			</div>
			<div class="business_title" ids="IDS_waitVideo">正在连接客服，请稍候...</div>
		</div>
	</body>
</html>
