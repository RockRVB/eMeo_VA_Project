<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script src="../../js/vue.min.js"></script>
  <script src="../../js/grg-ui.min.js"></script>
  <script src="../../js/vue-i18n.js"></script>
  <script src="../../js/jquery-3.7.0.js"></script>	<script src="../../js/class/layer/layer.js"></script>	<script src="../../js/index.js"></script>
  <script src="../../js/coreScript.js"></script>
  <script src="../../js/ibank.js"></script>
  <link rel="stylesheet" href="../../css/grg-ui.min.css">
  <link rel="stylesheet" href="../../css/animate.grg.css">
  <link rel="stylesheet" href="../../css/ibank.css">
  <style>
    .grg-main {
      display: flex;
      justify-content: space-between;
      visibility: hidden;
    }

    .g-signature {
      width: 818px;
      height: 426px;
      margin-top: 50px;
      background-image: linear-gradient(#ededed, #ffffff);
      border: 2px solid #ededed;
    }

    .text {
      color: #231815;
      font-size: 24px;
      font-family: 'Alibaba Sans';
      text-align: center;
    }

    .button-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 24px;
      color: #231815;
      font-family: 'Alibaba Sans';
    }

    .button-row {
      display: flex;
      justify-content: center;
      margin-bottom: 30px;
    }

    .footer-box {
      position: absolute;
      display: flex;
      justify-content: center;
      width: 100%;
      left: 0;
      bottom: 25px;
      gap: 24px;
      color: #333333;
      font-size: 20px;
      font-family: "Alibaba Sans";
    }

    .footer-box .footer-item {
      display: flex;
      align-items: center;
    }

    .footer-box .footer-item img {
      margin-right: 4px;
    }

    .footer-box .footer-item .time-box {
      display: flex;
      gap: 5px;
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="grg-header" class="grg-header">
    </div>
    <div id="grg-main" class="grg-main animate_grg_fadeInRight">
      <div class="main-content-box">
        <div class="title">Sign</div>
        <div class="text">Please sign here.</div>
        <g-signature v-model='signPic_base64' class="g-signature"></g-signature>

        <div class="button-box">      
          <div class="button-row">
            <div class="grg-btn grg-cancel" id='OnConfirm' type='button' tag='OnCancel'>
              <img class="icon-img" src="../../images/img_2.4/icon-cancel.png" alt="">Disagree
            </div>
            <div :class='["grg-btn", signPic_base64 ? "grg-confirm" : "grg-cancel"]' @click='clear'>
              <img v-if="signPic_base64" class="icon-img" src="../../images/img_2.4/icon_retry_white.png" alt="">
              <img v-else class="icon-img" src="../../images/img_2.4/icon_retry.png" alt="">Clear
            </div>
            <div :class='["grg-btn", signPic_base64 ? "grg-confirm" : "grg-cancel"]' :type='signPic_base64 ? "button" : ""'  tag='OnSignConfirm'>
              <img v-if="signPic_base64" class="icon-img" src="../../images/img_2.4/icon-ok.png" alt="">
              <img v-else class="icon-img" src="../../images/img_2.4/icon-ok-blue.png" alt="">Confirm
            </div>
          </div>
          
        </div>
        <input hidden id="signPic_base64" content="{Binding SendFile_Signature mode=2}" v-model='signPic_base64'>
      </div>
    </div>
  </div>
</body>

</html>
<script>
  var app = new Base({
    i18n: i18n,
    data: {
      signPic_base64: '',
    },
    methods: {
      clear: function () {
        this.signPic_base64 = ''
      },
    },
    computed: {},
    mounted: function () {}
  }).$mount('#app')
</script>
