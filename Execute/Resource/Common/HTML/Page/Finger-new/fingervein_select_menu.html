<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biometric Select Transition</title>
    <script src="../../js/vue.min.js"></script>
    <script src="../../js/grg-ui.min.js"></script>
    <script src="../../js/vue-i18n.js"></script>
    <script src="../../js/jquery-3.7.0.js"></script>	<script src="../../js/class/layer/layer.js"></script>	<script src="../../js/index.js"></script>
    <script src="../../js/coreScript.js"></script>
    <script src="../../js/ibank.js"></script>
    <link rel="stylesheet" href="../../css/grg-ui.min.css">
    <link rel="stylesheet" href="../../css/ibank.css">
    <link rel="stylesheet" href="../../css/animate.grg.css">
    <style>
    </style>
</head>

<style>
    .main-custom-btn-box {
        margin-top: 151px;
        display: flex;
        justify-content: space-between;
        width: 1470px;
    }

    .card-img-btn {
        margin-top: 83px;
        margin-bottom: 19px;
        width: 160px;
        height: 160px;
    }

    .card-text-btn {
        height: 32px;
        font-size: 28px;
        font-weight: 400;
        color: #333333;
        line-height: 32px;
        text-transform: uppercase;
        font-family: "Alibaba Sans";
    }

    @media only screen and (width: 1280px) {
        .main-custom-btn-box {
            margin-top: 55px;
            flex-wrap: wrap;
            width: 800px;
        }

        .card-img-btn {
            margin-top: 28px;
            margin-bottom: 17px;
            width: 154px;
            height: 154px;
        }

        .custom-btn-margin {
            margin-bottom: 40px;
        }
    }

</style>

<body>
<div id="grg-header" class="grg-header">
</div>
<div id="grg-main" class="grg-main animate_grg_fadeInRight_other">
    <!-- <div class="count-down">
        <div class="count-down-2">60</div>
    </div> -->
    <div class="main-title" ids="ids_Common_selectItem">Please select transaction</div>
    <div class="main-btn">
        <div class="main-custom-btn-box">
            <div class="main-custom-btn custom-btn-margin" id='Match' type='button' tag='OnMatch'>
                <img class="card-img-btn" src="../../images/img_2.4/match@2x.png">
                <div class="card-text-btn" ids="ids_finger_matchFingervein">Match Fingervein</div>
            </div>
            <div class="main-custom-btn" id='Register' type='button' tag='OnRegister'>
                <img class="card-img-btn" src="../../images/img_2.4/register@2x.png" >
                <div class="card-text-btn" ids="ids_finger_registFingervein">Register Fingervein</div>
            </div>
            <div class="main-custom-btn" id='Delete' type='button' tag='OnDelete'>
                <img class="card-img-btn" src="../../images/img_2.4/delete@2x.png">
                <div class="card-text-btn" ids="ids_finger_deleteFingervein">Delete Fingervein</div>
            </div>
            <div class="main-custom-btn" id='DeleteAll' type='button' tag='OnDeleteAll'>
                <img class="card-img-btn" src="../../images/img_2.4/delete_all@2x.png">
                <div class="card-text-btn" ids="ids_finger_deleteAllFingervein">Delete all Fingervein</div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
