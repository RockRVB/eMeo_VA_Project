<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src=""></script>
    <title>Document</title>
    <script src="../../js/vue.min.js"></script>
    <script src="../../js/grg-ui.min.js"></script>
    <script src="../../js/ibank.js"></script>
    <link rel="stylesheet" href="../../css/grg-ui.min.css">
    <link rel="stylesheet" href="../../css/ibank.css">
    <style>
        .card-wrapper {
            margin: 0 auto;
            width: 80%; 
            padding: 50px 0;
        }
    </style>
</head>
<body>
    <div id="app">
        <g-header>
            <img slot='left' class='logo' src="../../images/logo.png" alt="">
            <g-button class="exit-btn" slot='right' id='exitBtn' ids='ids_Exit' transparent>Exit</g-button>
        </g-header>
        <g-main>
			<div>Welcome Customer:<span content="{Binding FB_CustomerId}" id="CustomerId" type="text"></span></div>
            <h2 ids='ids_face_selectTransType' class='main-title'>Please select transaction</h2>
            <g-row class="card-wrapper">
                <g-col :span='12'>
                    <g-card @click='goto("fingerveinMatch")'>
                        <img slot='header' src="../../images/fingervein.png" />
                        <p slot='footer' ids='ids_finger_matchFingervein'>Match Fingervein</p>
                    </g-card>
                </g-col>
                <g-col :span='12'>
                    <g-card @click='goto("inputPin")'>
                        <img slot='header' src="../../images/icon_set_password.png" alt="">
                        <p slot='footer'  ids=" ids="ids_Common_notdiscoverpin"">Input Password</p>
                    </g-card>
                </g-col>
            </g-row>
        </g-main>
    </div>
</body>
</html>
