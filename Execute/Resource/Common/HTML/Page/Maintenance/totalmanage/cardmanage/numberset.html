<body onselectstart="return false">
<!--界面容器-->
<div class="wrapper add-cash">
	<div class="add-cash-wrapper"> 
		<!--左边-->
		<div class="add-cash-left"> 
			<!--表格控件-->
			<div id="table_1" class="type-table reversal-color" type="TABLE" maxRowCount="9" rowCount="9"> 
				<!--翻页按钮-->
				<div class="type-table-paging none">
					<div class="middle-outer">
						<div class="middle-inner">
							<button class="button-page" mark="prev" dataToSend="78" id="prev"><span class="tip"></span> <span class="button-text">▲</span></button>

						</div>
					</div>
				</div>
				<div class="type-table-container table_margin_top ">
					<table>
						<thead>
							<tr class="">
								<th><span id="STATIC_SegNumSeq" ids="IDS_SegmentNumSeq">序号</span></th>
								<th><span id="STATIC_BeginNum" ids="IDS_CardSegNumBegin">开始号段</span></th>
								<th><span id="STATIC_EndNum" ids="IDS_CardSegNumEnd">结束号段</span></th>
								<th><span id="STATIC_Count" ids="IDS_CardSegCount">张数</span></th>
							</tr>
						</thead>
						<tbody>
							<tr class="">
								<td><span id="STATIC_Seq_1"  type="STATIC_TXT"></span></td>
								<td><input id="INPUT_BeginNum_1" type="text" class="input-text-cardno input-sheet  "  value="" maxlength="19" validchars = "0123456789" /></td>
								<td><input id="INPUT_EndNum_1" type="text" class="input-text-cardno input-sheet  "  value="" maxlength="19" validchars = "0123456789" /></td>
								<td><input id="INPUT_Count_1" type="text" class="input-text-cardcount  input-sheet  "  value="" maxlength="12" validchars = "0123456789" /></td>
							</tr>
							<tr class="">
								<td><span id="STATIC_Seq_2"   type="STATIC_TXT"></span></td>
								<td><input id="INPUT_BeginNum_2" type="text" class="input-text-cardno input-sheet  "  value="" maxlength="19" validchars = "0123456789" /></td>

								<td><input id="INPUT_Count_3" type="text" class="input-text-cardcount input-sheet  "  value="" maxlength="12" validchars = "0123456789" /></td>
							</tr>

							</tr>

					<!--按钮区域-->

						<button id="FUN_1" type="button" class="button-common mr5"> <span class="tip"></span> <span class="button-text" ids="ID_AddSegment">添加</span> </button>
