<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>设最大限额</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
<meta http-equiv="pragma" content="no-cache"  />
<meta http-equiv="cache-control" content="no-cache,must-revalidate" />
<meta http-equiv="expires" content="0"/>
<link rel="stylesheet" type="text/css" href="../../../../thirdparty/bootstrap/css/bootstrap.min.css" />
<link rel="stylesheet" type="text/css" href="../../../../css/maintenance/cn.css" />
<script src="../../../../js/jquery-3.7.0.min.js"></script>
<script src="../../../../js/jquery-ui.min.js"></script>
<script src="../../../../thirdparty/bootstrap/js/bootstrap.min.js"></script>
<script src="../../../../js/maintenance/common/global.js"></script>
<script src="../../../../js/maintenance/component/components.js"></script>
<script src="../../../../js/maintenance/system/widget-manage.js"></script>
<script src="../../../../js/maintenance/ui/interface.js"></script>
<script src="../../../../js/maintenance/ui/custom-ui.js"></script>
</head>
<script>
window.onload = function(){

setTimeout(function(){$("#INPUT_MAXAMTOFTRANSFER").attr({disabled:"disabled"});},100);
}
</script>
<body>
<!--界面容器-->
<div class="wrapper set-max-amount">
	<div class="g-margin-wrapper"> 
		<!--左边-->
		<div class="g-left-wrapper">
			<div class="g-left">
				<div class="set-max-amount-row"> <span id="STATIC_1" type="STATIC_TXT" ids="IDS_MaximumWithdrawal">请输入一次最大取款金额,当前值:</span>
				</div>
				<div class="set-max-amount-row"> <span id="STATIC_MAXAMTOFWITHDRAW" type="STATIC_TXT" class="g-prompt-color">2500</span>
				</div>
				<div class="set-max-amount-row"> <input id="INPUT_MAXAMTOFWITHDRAW" type="text" class="input-text"  value="" maxlength="5" validchars="0123456789">
				</div>
				
				<div class="set-max-amount-row"> <span id="STATIC_2" type="STATIC_TXT" ids="IDS_MaximumTransfer">请输入一次转账最大金额,当前值:</span>
				</div>
				<div class="set-max-amount-row"> <span id="STATIC_MAXAMTOFTRANSFER" type="STATIC_TXT" class="g-prompt-color">50000.00</span>
				</div>
				<div class="set-max-amount-row"> <input id="INPUT_MAXAMTOFTRANSFER" type="text" class="input-text"  value="" maxlength="7" validchars="0123456789.">
				</div>
				
				<!--操作提示-->
				<div class="g-prompt"> <span id="STATIC_PROMPT" type="STATIC_TXT"></span> </div>
			</div>
		</div>
		<!--右边-->
		<div class="g-right"> 
			<!--键盘-->
			<div id="KEYBOARD_1" type="KEYBOARD" class="keyboard" firstPage="3" useChangeKey = "0" clearKeyIndex = "29" disableKey="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz;+-*/=@#$%()?,:"> 
				<!--键盘操作提示-->
				<div id="keyboard-tip" class="keyboard-tip clear none" ids="IDS_KeyboardTip">按00键可以在输入框和键盘之间切换</div>
			</div>
		</div>
	</div>
</div>
</body>
</html>
