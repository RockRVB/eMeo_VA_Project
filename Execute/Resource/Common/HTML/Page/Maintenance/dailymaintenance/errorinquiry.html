<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>错误查询</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
<meta http-equiv="pragma" content="no-cache"  />
<meta http-equiv="cache-control" content="no-cache,must-revalidate" />
<meta http-equiv="expires" content="0"/>
<link rel="stylesheet" type="text/css" href="../../../thirdparty/bootstrap/css/bootstrap.min.css" />
<link rel="stylesheet" type="text/css" href="../../../css/maintenance/cn.css" />
<script src="../../../js/jquery-3.7.0.min.js"></script>
<script src="../../../js/jquery-ui.min.js"></script>
<script src="../../../thirdparty/bootstrap/js/bootstrap.min.js"></script>
<script src="../../../js/maintenance/common/global.js"></script>
<script src="../../../js/maintenance/component/components.js"></script>
<script src="../../../js/maintenance/system/widget-manage.js"></script>
<script src="../../../js/maintenance/ui/interface.js"></script>
<script src="../../../js/maintenance/ui/maintenance/dailymaintenance/errorinquiry.js"></script>
</head>

<body>
<!--界面容器-->
<div class="wrapper error-inquiry">
	<div class="g-margin-wrapper"> 
		<!--左边-->
		<div class="g-left-wrapper">
			<div class="g-left">
				<div class="error-inquiry-row"> <span id="STATIC_1" type="STATIC_TXT" class="left-label" ids="IDS_EnterErrorCode">请输入要查询的错误码:</span>
					<input id="INPUT_ERRORCODE" type="text" class="input-text"  value="" maxlength="6" validchars="-0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ">
				</div>
				<div class="error-inquiry-row error-inquiry-result"> <span id="STATIC_ERRORCODERESULT" type="STATIC_TXT" class="g-prompt-color"></span>
				</div>
				<div class="error-inquiry-row"> <span id="STATIC_2" type="STATIC_TXT" class="left-label" ids="IDS_InquireHostCode">您还可以查询主机返回码</span>
				</div>
				<div class="error-inquiry-row"> <span id="STATIC_3" type="STATIC_TXT" class="left-label" ids="IDS_EnterHostCode">请输入要查询的主机返回码:</span>
					<input id="INPUT_RESPCODE" type="text" class="input-text"  value="" maxlength="4" validchars="-0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ">
				</div>
				<div class="error-inquiry-row"> <span id="STATIC_RESCODEDES" type="STATIC_TXT" class="g-prompt-color"></span>
				<span id="STATIC_RESPCODERESULT" type="STATIC_TXT" class="g-prompt-color"></span>
				</div>
			</div>
		</div>
		<!--右边-->
		<div class="g-right"> 
			<!--键盘-->
			<div id="KEYBOARD_1" type="KEYBOARD"  class="keyboard" firstPage="2" disableKey="GHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz;+*/=@#$%()?,:."> 
				<!--键盘操作提示-->
				<div id="keyboard-tip" class="keyboard-tip clear none" ids="IDS_KeyboardTip">按00键可以在输入框和键盘之间切换</div>
			</div>
		</div>
	</div>
</div>
</body>
</html>
