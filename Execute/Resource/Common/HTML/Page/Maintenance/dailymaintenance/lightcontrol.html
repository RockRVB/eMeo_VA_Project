<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>日光灯设置</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
<meta http-equiv="pragma" content="no-cache"  />
<meta http-equiv="cache-control" content="no-cache,must-revalidate" />
<meta http-equiv="expires" content="0"/>
<link rel="stylesheet" type="text/css" href="../../../thirdparty/bootstrap/css/bootstrap.min.css" />
<link rel="stylesheet" type="text/css" href="../../../css/maintenance/cn.css" />
<script src="../../../js/jquery-3.7.0.min.js"></script>
<script src="../../../js/jquery-ui.min.js"></script>
<script src="../../../thirdparty/bootstrap/js/bootstrap.min.js"></script>
<script src="../../../js/maintenance/common/global.js"></script>
<script src="../../../js/maintenance/component/components.js"></script>
<script src="../../../js/maintenance/system/widget-manage.js"></script>
<script src="../../../js/maintenance/ui/interface.js"></script>
<script src="../../../js/maintenance/ui/custom-ui.js"></script>
</head>

<body>
<!--界面容器-->
<div class="wrapper light-control">
	<div class="g-margin-wrapper"> 
		<!--左边-->
		<div class="g-left-wrapper">
			<div class="g-left"> 
				<!--开始时间文字-->
				<div class="g-start-text"> <span id="STATIC_1" type="STATIC_TXT" ids="IDS_BeginTime">请输入开启时间:</span> </div>
				<!--开始日期-->
				<div class="g-start-date">
					<input id="INPUT_ONHOUR" type="text" class="input-text"  value="" maxlength="2" validchars = "0123456789">
					<span id="STATIC_ONHOUR" type="STATIC_TXT" class="g-datetime-span" ids="IDS_HourMenu_46a">时</span>
					<input id="INPUT_ONMINUTE" type="text" class="input-text"  value="" maxlength="2" validchars = "0123456789">
					<span id="STATIC_ONMINUTE" type="STATIC_TXT" class="g-datetime-span" ids="IDS_MinuteMenu_46a">分</span> 
					
					<!--结束时间文字-->
					<div class="g-end-text"> <span id="STATIC_2" type="STATIC_TXT" ids="IDS_EndTime">请输入关闭时间:</span> </div>
					<!--结束日期-->
					<div class="g-end-date">
						<input id="INPUT_OFFHOUR" type="text" class="input-text"  value="" maxlength="2" validchars = "0123456789">
						<span id="STATIC_OFFHOUR" type="STATIC_TXT" class="g-datetime-span" ids="IDS_HourMenu_46b">时</span>
						<input id="INPUT_OFFMINUTE" type="text" class="input-text"  value="" maxlength="2" validchars = "0123456789">
						<span id="STATIC_OFFMINUTE" type="STATIC_TXT" class="g-datetime-span" ids="IDS_MinuteMenu_46b">分</span></div>
					
					<!--操作提示-->
					<div class="g-prompt"> <span id="STATIC_PROMPT" type="STATIC_TXT"></span> </div>
				</div>
			</div>
		</div>
		<!--右边-->
		<div class="g-right"> 
			<!--键盘-->
			<div id="KEYBOARD_NUMBER_1" type="KEYBOARD_NUMBER" class="keyboard-number"> 
				<!--键盘操作提示-->
				<div id="keyboard-tip" class="keyboard-tip clear none" ids="IDS_KeyboardTip">按00键可以在输入框和键盘之间切换</div>
			</div>
		</div>
	</div>
</div>
</body>
</html>
