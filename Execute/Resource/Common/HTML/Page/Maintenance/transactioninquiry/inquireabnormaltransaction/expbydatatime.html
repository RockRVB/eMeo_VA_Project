<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>按时间查异常</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
<meta http-equiv="pragma" content="no-cache"  />
<meta http-equiv="cache-control" content="no-cache,must-revalidate" />
<meta http-equiv="expires" content="0"/>
<link rel="stylesheet" type="text/css" href="../../../../thirdparty/bootstrap/css/bootstrap.min.css" />
<link rel="stylesheet" type="text/css" href="../../../../css/maintenance/cn.css" />
<script src="../../../../js/jquery-3.7.0.min.js"></script>
<script src="../../../../js/jquery-ui.min.js"></script>
<script src="../../../../thirdparty/bootstrap/js/bootstrap.min.js"></script>
<script src="../../../../js/maintenance/common/global.js"></script>
<script src="../../../../js/maintenance/component/components.js"></script>
<script src="../../../../js/maintenance/system/widget-manage.js"></script>
<script src="../../../../js/maintenance/ui/interface.js"></script>
<script src="../../../../js/maintenance/ui/maintenance/transactioninquiry/inquireabnormaltransaction/expbydatatime.js"></script>
</head>

<body>
<!--界面容器-->
<div class="wrapper exp-by-data-time">
	<div class="g-margin-wrapper"> 
		<!--左边-->
		<div class="g-left-wrapper">
			<div class="g-left"> 
				<!--开始时间文字-->
				<div class="g-start-text"> <span id="STATIC_1" type="STATIC_TXT" ids="IDS_StartingTimeMenu_1815">请输入开始时间：</span> </div>
				<!--开始日期-->
				<div class="g-start-date">
					<input id="INPUT_SYEAR" type="text" class="input-text"  value="" maxlength="4" validchars = "0123456789">
					<span id="STATIC_SYEAR" type="STATIC_TXT" class="g-datetime-span" ids="IDS_YearMenu_1815a">年</span>
					<input id="INPUT_SMONTH" type="text" class="input-text"  value="" maxlength="2" validchars = "0123456789">
					<span id="STATIC_SMONTH" type="STATIC_TXT" class="g-datetime-span" ids="IDS_MonthMenu_1815a">月</span>
					<input id="INPUT_SDAY" type="text" class="input-text"  value="" maxlength="2" validchars = "0123456789">
					<span id="STATIC_SDAY" type="STATIC_TXT" class="g-datetime-span" ids="IDS_DayMenu_1815a">日</span> </div>
				<!--开始时间-->
				<div class="g-start-time">
					<input id="INPUT_SHOUR" type="text" class="input-text"  value="" maxlength="2" validchars = "0123456789">
					<span id="STATIC_SHOUR" type="STATIC_TXT" class="g-datetime-span" ids="IDS_HourMenu_1815a">时</span>
					<input id="INPUT_SMINUTE" type="text" class="input-text"  value="" maxlength="2" validchars = "0123456789">
					<span id="STATIC_SMINUTE" type="STATIC_TXT" class="g-datetime-span" ids="IDS_MinuteMenu_1815a">分</span>
					<input id="INPUT_SSECOND" type="text" class="input-text"  value="" maxlength="2" validchars = "0123456789">
					<span id="STATIC_SSECOND" type="STATIC_TXT" class="g-datetime-span" ids="IDS_SecondMenu_1815a">秒</span> </div>
				
				<!--结束时间文字-->
				<div class="g-end-text"> <span id="STATIC_2" type="STATIC_TXT" ids="IDS_ClosingTimeMenu_1815">请输入结束时间：</span> </div>
				<!--结束日期-->
				<div class="g-end-date">
					<input id="INPUT_EYEAR" type="text" class="input-text"  value="" maxlength="4" validchars = "0123456789">
					<span id="STATIC_EYEAR" type="STATIC_TXT" class="g-datetime-span" ids="IDS_YearMenu_1815b">年</span>
					<input id="INPUT_EMONTH" type="text" class="input-text"  value="" maxlength="2" validchars = "0123456789">
					<span id="STATIC_EMONTH" type="STATIC_TXT" class="g-datetime-span" ids="IDS_MonthMenu_1815b">月</span>
					<input id="INPUT_EDAY" type="text" class="input-text"  value="" maxlength="2" validchars = "0123456789">
					<span id="STATIC_EDAY" type="STATIC_TXT" class="g-datetime-span" ids="IDS_DayMenu_1815b">日</span> </div>
				<!--结束时间-->
				<div class="g-end-time">
					<input id="INPUT_EHOUR" type="text" class="input-text"  value="" maxlength="2" validchars = "0123456789">
					<span id="STATIC_EHOUR" type="STATIC_TXT" class="g-datetime-span" ids="IDS_HourMenu_1815b">时</span>
					<input id="INPUT_EMINUTE" type="text" class="input-text"  value="" maxlength="2" validchars = "0123456789">
					<span id="STATIC_EMINUTE" type="STATIC_TXT" class="g-datetime-span" ids="IDS_MinuteMenu_1815b">分</span>
					<input id="INPUT_ESECOND" type="text" class="input-text"  value="" maxlength="2" validchars = "0123456789">
					<span id="STATIC_ESECOND" type="STATIC_TXT" class="g-datetime-span" ids="IDS_SecondMenu_1815b">秒</span> </div>
				<!--时间提示-->
				<div class="g-datetime-tip"> <span id="STATIC_PS" type="STATIC_TXT" ids="IDS_TreatedMenu_1815">*空白作为0处理</span> </div>
			</div>
			<!--出错提示-->
			<div class="g-prompt"> <span id="STATIC_PROMPT" type="STATIC_TXT"></span> </div>
		</div>
		<!--右边-->
		<div class="g-right"> 
			<!--键盘-->
			<div id="KEYBOARD_NUMBER_1" type="KEYBOARD_NUMBER" class="keyboard-number"> 
				<!--键盘操作提示-->
				<div id="keyboard-tip" class="keyboard-tip clear none" ids="IDS_KeyboardTip">按00键可以在输入框和键盘之间切换</div>
			</div>
		</div>
	</div>
</div>
</body>
</html>
