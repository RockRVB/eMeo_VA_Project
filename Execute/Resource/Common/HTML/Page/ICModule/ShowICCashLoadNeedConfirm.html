<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.0 Transitional//EN">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=gb2312" />
<title></title>
<link rel="stylesheet" type="text/css" href="../../css/CN.css" replace="1" />
<link rel="stylesheet" type="text/css" href="../../css/Button.css" />
<script defer type="text/javascript" src="../../js/ShowResource.js"></script>
</head>
<body>
<div class="backgroundDiv">
  <div class="CounterDiv" style="display:none" id="Counter" type="countdown" content="{Binding Count}" visible="{Binding CouterVisible}"> </div>
  <div class="mainDivTwoLines" id="Prompt" type="textblock" ids="IDS_CalculatedTotalCash"> </div>
  <div class="inputDiv">
    <input class="inputTextCenterAlign" id="InputTransferAmount" type="text" size="12" content="{Binding core_ScreenAmount}" />
  </div>

  <div class="promptDiv"> <span class="promptNormalText" ids="IDS_MaxICLoadAmount"></span>&nbsp;<span class="promptKeyText" id="Prompt1" type="text" content="{Binding core_ICAvailableLoadAmount}"></span>&nbsp;<span class="promptNormalText" id="Prompt2" ids="IDS_Currency"></span> </div>
  
  <div class="mainDivTwoLines" style="display:none" id="CanNotDoICLoad" type="textblock" content="{Binding IDS_CanNotDoICLoad}" visible="{Binding CanNotDoICLoad}"> 
	</div>
    
  <div class="f6Div" id="F6" tag="OnConfirm" type="Button" visible="{Binding CanDoICLoad}"> <img src="../../../Image/CN/Btn_Bg1_right_up.png" id="bgimg" up="(btnbg1rightup)" down="(btnbg1rightdw)" /> <span class="buttonRight" ids="IDS_Confirm"></span> </div>
  <div class="f8Div" id="F8" tag="OnCancel" type="Button"> <img src="../../../Image/CN/Btn_Bg2_right_up.png" id="bgimg" up="(btnbg2rightup)" down="(btnbg2rightdw)" /> <span class="buttonRight" ids="IDS_TakeCard"></span> </div>
</div>
</body>
</html>
