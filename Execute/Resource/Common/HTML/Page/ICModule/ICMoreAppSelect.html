<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.0 Transitional//EN">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=gb2312" />
<title></title>
<link rel="stylesheet" type="text/css" href="../../css/CN.css" replace="1" />
<link rel="stylesheet" type="text/css" href="../../css/Button.css" />
<script defer type="text/javascript" src="../../js/ShowResource.js"></script>
</head>
<body>
<div class="backgroundDiv">
  <div class="CounterDiv" style="display:none" id="Counter" type="countdown" content="{Binding Count}" visible="{Binding CouterVisible}"> </div>
  <div class="mainDivOneLine" ids="IDS_SelectApplication"> </div>
  <div class="f1Div" style="display:none" id="F1" tag="OnF1" type="Button" visible="{Binding ICF1_Visible}"> <img src="../../../Image/CN/Btn_Bg1_left_up.png" id="bgimg" up="(btnbg1leftup)" down="(btnbg1leftdw)" /> <span class="buttonLeft" id="text1" type="text" style="font-size: 14px" content="{Binding ICF1_Content}"></span> </div>
  <div class="f2Div" style="display:none" id="F2" tag="OnF2" type="Button" visible="{Binding ICF2_Visible}"> <img src="../../../Image/CN/Btn_Bg1_right_up.png" id="bgimg" up="(btnbg1rightup)" down="(btnbg1rightdw)" /> <span class="buttonRight" id="text2" type="text" style="font-size: 14px" content="{Binding ICF2_Content}"></span> </div>
  <div class="f3Div" style="display:none" id="F3" tag="OnF3" type="Button" visible="{Binding ICF3_Visible}"> <img src="../../../Image/CN/Btn_Bg1_left_up.png" id="bgimg" up="(btnbg1leftup)" down="(btnbg1leftdw)" /> <span class="buttonLeft" id="text3" type="text" style="font-size: 14px" content="{Binding ICF3_Content}"></span> </div>

  <div class="f5Div" style="display:none" id="F5" tag="OnF5" type="Button" visible="{Binding ICF5_Visible}"> <img src="../../../Image/CN/Btn_Bg1_left_up.png" id="bgimg" up="(btnbg1leftup)" down="(btnbg1leftdw)" /> <span class="buttonLeft" id="text5" type="text" style="font-size: 19px" content="{Binding ICF5_Content}"></span> </div>
  <div class="f6Div" style="display:none" id="F6" tag="OnF6" type="Button" visible="{Binding ICF6_Visible}"> <img src="../../../Image/CN/Btn_Bg1_right_up.png" id="bgimg" up="(btnbg1rightup)" down="(btnbg1rightdw)" /> <span class="buttonRight" id="text6" type="text" style="font-size: 19px" content="{Binding ICF6_Content}"></span> </div>
  <div class="f7Div" style="display:none" id="F7" tag="OnF7" type="Button" visible="{Binding ICF7_Visible}"> <img src="../../../Image/CN/Btn_Bg1_left_up.png" id="bgimg" up="(btnbg1leftup)" down="(btnbg1leftdw)" /> <span class="buttonLeft" id="text7" type="text" style="font-size: 19px" content="{Binding ICF7_Content}"></span> </div>
  <div class="f8Div" style="display:none" id="F8" tag="OnF8" type="Button" visible="{Binding ICF8_Visible}"> <img src="../../../Image/CN/Btn_Bg1_right_up.png" id="bgimg" up="(btnbg1rightup)" down="(btnbg1rightdw)" /> <span class="buttonRight" id="text8" type="text" style="font-size: 19px" content="{Binding ICF8_Content}"></span> </div>
</div>
