<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script src="../../js/vue.min.js"></script>
  <script src="../../js/grg-ui.min.js"></script>
  <script src="../../js/vue-i18n.js"></script>
  <script src="../../js/jquery-3.7.0.js"></script>	<script src="../../js/class/layer/layer.js"></script>	<script src="../../js/index.js"></script>
  <script src="../../js/coreScript.js"></script>
  <script src="../../js/ibank.js"></script>
  <link rel="stylesheet" href="../../css/grg-ui.min.css">
  <link rel="stylesheet" href="../../css/animate.grg.css">
  <link rel="stylesheet" href="../../css/ibank.css">
  <style>
    .grg-main {
      display: flex;
      justify-content: space-between;
      visibility: hidden;
    }

    .main-content-box {
      width: 100%;
      text-align: center;
    }

    .main-content-box .title {
      margin-top: 60px;
    }

    .main-content-box .title-2 {
      color: #333333;
      font-size: 28px;
      font-weight: 400;
    }

    .face-recognition-box {
      display: flex;
      width: 410px;
      height: 410px;
      background: #ffffff;
      border-radius: 50%;
      margin: 30px auto 20px;
    }

    .face-recognition-box2 {
      display: flex;
      width: 390px;
      height: 390px;
      background: #757575;
      border-radius: 50%;
      margin: auto;
    }

    .hint-box {
      display: flex;
      justify-content: space-around;
      width: 100%;
      padding: 0 18%;
    }

    .hint-box .hint-item {
      padding: 10px 10px;
      box-sizing: border-box;
    }

    .hint-box .hint-item:last-child {
      margin-right: 0;
    }

    .hint-box .hint-item .top img {
      display: inline-block;
    }

    .hint-box .hint-item .bottom {
      font-size: 28px;
      color: #333333;
    }

    .foot-information-box {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 25px;
    }

    .foot-information-box .information-item {
      display: flex;
      align-items: center;
      font-size: 20px;
      font-weight: 400;
      color: #333333;
    }

    .foot-information-box .information-item .lable {
      margin-right: 6px;
    }

    .foot-information-box .information-item .value {
      display: flex;
    }

    .foot-information-box .information-item .value::after {
      content: '';
      display: inline-block;
      width: 1px;
      height: 1em;
      margin: auto 15px;
      background-color: #333333;
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="grg-header" class="grg-header">
    </div>
    <div id="grg-main" class="grg-main animate_grg_fadeInRight">
      <div class="main-content-box">
        <div class="title" ids='ids_FaceVerification'>Face Verification</div>
        <div class="title-2" ids='ids_FaceVerificationPrompt'>GRG Banking will collect your face image for ID verification only. <br />All information is kept strictly confidential.</div>
        <div class="face-recognition-box">
          <div class="face-recognition-box2"></div>
        </div>
        <div class="hint-box">
          <div class="hint-item" v-for="(item, index) in hintData" :key="index">
            <div class="top"><img :src="item.imgUrl" alt=""></div>
            <div class="bottom">{{ item.text }}</div>
          </div>
        </div>
        <div class="foot-information-box">
          <div class="information-item">
            <div class="lable">Device ID:</div>
            <div class="value">XXXXXXXXX</div>
            <div class="date">Sunday, 05 October 2024</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
<script>
  var app = new Base({
    i18n: i18n,
    data: {
      hintData: [
        {
          imgUrl: '../../images/img_2.4/no-glasses.png',
          text: 'No Glasses',
        },
        {
          imgUrl: '../../images/img_2.4/no-hat.png',
          text: 'No Hat',
        },
        {
          imgUrl: '../../images/img_2.4/no-mask.png',
          text: 'No Mask',
        }
      ],
    },
    methods: {},
    computed: {},
    mounted: function () {
      let _this = this;
    }
  }).$mount('#app')
</script>
