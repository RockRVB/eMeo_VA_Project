	<script>
            var banners = ["../../../AD/0.png","../../../AD/1.png","../../../AD/2.png","../../../AD/3.png","../../../AD/4.png"]; // 图片地址
            var counter = 0;
            function run(){
                setInterval(cycle,5000);  //重复运行cycle函数，周期100ms
            }
            function cycle(){
                counter++;
                if(counter == banners.length)    
                    counter = 0;
                document.getElementById("banner").src = banners[counter];
            }
			run();
        </script>
