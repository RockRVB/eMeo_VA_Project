<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.0 Transitional//EN">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=gb2312" />
<title></title>
<link rel="stylesheet" type="text/css" href="../../css/CN.css" replace="1" />
<link rel="stylesheet" type="text/css" href="../../css/Button.css" />
<script defer type="text/javascript" src="../../js/ShowResource.js"></script>
</head>
<body>
<div class="backgroundDiv">
  <div class="CounterDiv" style="display:none" id="Counter" type="countdown" content="{Binding Count}" visible="{Binding CouterVisible}"> </div>
  <div class="mainDivOneLine" ids="IDS_DEPOSIT_WAITFOR_INSERTCASH_NOCASH"> </div>
  
  <div id="divPrompt1" class="promptDiv" type="textblock" visible="{Binding DivPromptVisible}"> <span class="promptNormalText" ids="IDS_DEPOSITSUPPLYDENO"> </span>&nbsp;<span class="promptKeyText" id="Prompt1" type="text" content="{Binding core_DepositDenomination}"></span>&nbsp;<span class="promptNormalText" id="Prompt2" ids="IDS_Currency"></span> </div>
  
  <div class="promptDiv"> <span class="promptNormalText" ids="IDS_LEFTCASHINNOTESCOUNT"> </span>&nbsp;<span class="promptKeyText" id="Prompt3" type="text" content="{Binding core_LeftDepositCashCount}"></span>&nbsp;<span class="promptNormalText" id="Prompt4" ids="IDS_DEPOSIT_PIECE"></span> </div>
  
  <div class="f6Div" id="F6" tag="OnConfirm" type="Button"> <img src="../../../Image/CN/Btn_Bg1_right_up.png" id="bgimg" up="(btnbg1rightup)" down="(btnbg1rightdw)" /> <span class="buttonRight" ids="IDS_Confirm"></span> </div>
  <div class="f7Div" id="F7" tag="OnCancel" type="Button"> <img src="../../../Image/CN/Btn_Bg2_left_up.png" id="bgimg" up="(btnbg2leftup)" down="(btnbg2leftdw)" /> <span class="buttonLeft" ids="IDS_Cancel"></span> </div>
</div>
</body>
</html>
