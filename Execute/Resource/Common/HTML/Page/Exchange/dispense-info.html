<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script src="../../js/vue.min.js"></script>
  <script src="../../js/grg-ui.min.js"></script>
  <script src="../../js/vue-i18n.js"></script>
  <script src="../../js/jquery-3.7.0.js"></script>	<script src="../../js/class/layer/layer.js"></script>	<script src="../../js/index.js"></script>
  <script src="../../js/coreScript.js"></script>
  <script src="../../js/ibank.js"></script>
  <link rel="stylesheet" href="../../css/grg-ui.min.css">
  <link rel="stylesheet" href="../../css/animate.grg.css">
  <link rel="stylesheet" href="../../css/ibank.css">
  <style>
    .grg-main {
      display: flex;
      justify-content: space-between;
      visibility: hidden;
    }

	
	.info-box {
      width: 100%;
      font-family: 'Alibaba Sans';
      margin-top: 85px;
    }

    .info-box .info-content-box {
      width: 660px;
      height: 300px;
      margin-left: 50%;
      transform: translateX(-50%);
      background: #FFFFFF;
      border-radius: 12px;
      padding: 30px 30px;
      box-sizing: border-box;
	  position: absolute;
      top: 33%;
    }

    .info-box .info-content-box .info-item {
      display: flex;
      justify-content: space-between;
      color: #666666;
      font-size: 30px;
    }
	.info-box .info-content-box .info-item-sub {
      display: flex;
      justify-content: space-between;
      color: #666666;
      font-size: 20px;
    }

    .info-box .info-content-box .info-item .number-val {
      color: #333333;
      font-weight: bold;
    }
	
	.info-box .info-content-box .info-item .number-val-last {
      color: #296CFF;
      font-weight: bold;
    }

    .info-box .info-content-box .info-item:first-child {
      margin-bottom: 8px;
    }

    .info-box .info-content-box .info-item:last-child {
      color: #296CFF;
      align-items: center;
    }

    .info-box .info-line {
      width: 100%;
      border: 1px dashed #979797;
      margin: 20px 0;
    }
	.title-2 {
      font-size: 26px;
      color: #296CFF;
    }


  </style>
</head>

<body>
  <div id="app">
    <div id="grg-header" class="grg-header">
    </div>
    <div id="grg-main" class="grg-main animate_grg_fadeInRight">
      <div class="main-content-box">
        <div class="title" style="margin-top: 5%; font-size: 40px;" ids="ids_exchange_inofrmationquestion">Exchange capacity is insufficient, do you continue to exchange currency?</div>
		<div class="title-2"ids="ids_exchange_inofrmationtip">The missing amount can contact the bank to exchange</div>
        <div class="info-box">
              <div class="info-content-box">
                <div class="info-item">
                  <div class="info-item-label"ids="ids_exchange_AmountDue">Amount Due</div>
                  <div class="info-item-value">
                     <span content='{Binding exchange_HomeCurrency mode=2}'>€</span>
                    <span class="number-val" content='{Binding exchange_TargetAmount mode=2}'>120.00</span>
                  </div>
                </div>
                <div class="info-item-sub">
                  <div class="info-item-label" ids="ids_exchange_Banknote">- Banknote</div>
                  <div class="info-item-value">
                    <span class="number-val" content='{Binding ExchangeNoteAmount mode=2}'>100.00</span>
                  </div>
                </div>
				<div class="info-item-sub">
                  <div class="info-item-label" ids="ids_exchange_Coin">- Coin</div>
                  <div class="info-item-value">
                    <span class="number-val" content='{Binding ExchangeCoinAmount mode=2}'>20</span>
                  </div>
                </div>
                <div class="info-line">
                </div>
                <div class="info-item">
                  <div class="info-item-label" ids="ids_exchange_PayableAmount">Payable Amount</div>
                  <div class="info-item-value">
                    <span content='{Binding exchange_HomeCurrency mode=2}'>€</span>
                    <span class="number-val-last" content='{Binding DispensedAmount mode=2}' style="">100.00</span>
                  </div>
                </div>
				<div class="info-item-sub">
                  <div class="info-item-label" ids="ids_exchange_Banknote">- Banknote</div>
                  <div class="info-item-value">
                    <span class="number-val" content='{Binding DispensedNoteAmount mode=2}'>100.00</span>
                  </div>
                </div>
				<div class="info-item-sub">
                  <div class="info-item-label" ids="ids_exchange_Coin">- Coin</div>
                  <div class="info-item-value">
                    <span class="number-val" content='{Binding DispensedCoinAmount mode=2}'>0</span>
                  </div>
                </div>
              </div>
            </div>
        <div class="button-box">
          <div class="grg-btn grg-cancel" type='button' tag='OnNo' ids="ids_No">
            <img class="icon-img" src="../../images/img_2.4/icon_cancel.png" alt="">No
          </div>
          
          <div class="grg-btn grg-confirm" id='OnConfirm' type='button' tag='OnYes' ids="IDS_YES">
            <img v-if="signPic_base64" class="icon-img" src="../../images/img_2.4/icon-ok.png" alt="">
            <img v-else class="icon-img" src="../../images/img_2.4/icon-ok-blue.png" alt="">Yes
          </div>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
<script>
  var app = new Base({
    i18n: i18n,
    data: {
      signPic_base64: '',
    },
    methods: {
      clear: function () {
        this.signPic_base64 = ''
      }
    },
    computed: {},
    mounted: function () {}
  }).$mount('#app')
</script>
