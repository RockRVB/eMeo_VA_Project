<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script src="../../js/vue.min.js"></script>
  <script src="../../js/grg-ui.min.js"></script>
  <script src="../../js/vue-i18n.js"></script>
  <script src="../../js/jquery-3.7.0.js"></script>	<script src="../../js/class/layer/layer.js"></script>	<script src="../../js/index.js"></script>
  <script src="../../js/coreScript.js"></script>
  <script src="../../js/ibank.js"></script>
  <link rel="stylesheet" href="../../css/grg-ui.min.css">
  <link rel="stylesheet" href="../../css/animate.grg.css">
  <link rel="stylesheet" href="../../css/ibank.css">
  <style>
    .grg-main {
      display: flex;
      justify-content: space-between;
      visibility: hidden;
    }

	
	.info-box {
      width: 100%;
      font-family: 'Alibaba Sans';
      margin-top: 85px;
    }

    .info-box .info-content-box {
      width: 660px;
      height: 43%;
      margin-left: 50%;
      transform: translateX(-50%);
      background: #FFFFFF;
      border-radius: 12px;
      padding: 30px 30px;
      box-sizing: border-box;
	  position: absolute;
      top: 20%;
    }

    .info-box .info-content-box .info-item {
      display: flex;
      justify-content: space-between;
      color: #666666;
      font-size: 30px;
    }

    .info-box .info-content-box .info-item .number-val {
      color: #333333;
      font-weight: bold;
    }

    .info-box .info-content-box .info-item:first-child {
      margin-bottom: 28px;
    }

    .info-box .info-content-box .info-item:last-child {
      color: #333333;
      align-items: center;
    }

    .info-box .info-content-box .info-item:last-child .number-val {
      display: inline-block;
      color: #296CFF;
      font-weight: bold;
      font-size: 40px;
    }

    .info-box .info-line {
      width: 100%;
      border: 1px dashed #979797;
      margin: 40px 0;
    }


  </style>
</head>

<body>
  <div id="app">
    <div id="grg-header" class="grg-header">
    </div>
    <div id="grg-main" class="grg-main animate_grg_fadeInRight">
      <div class="main-content-box">
        <div class="title" style="margin-top: 5%;"  ids="ids_exchange_PrintingReceipt">Exchange Success! Printing Receipt...</div>
        <div class="info-box">
              <div class="info-content-box">
                <div class="info-item">
                  <div class="info-item-label"  ids="ids_exchange_ExchangeAmount">Exchange Amount</div>
                  <div class="info-item-value">
                    <span content='{Binding exchange_HomeCurrency mode=2}'>EUR</span>
                    <span id="a1" class="number-val" content='{Binding exchange_TargetAmount mode=2}'>200.00</span>
                  </div>
                </div>
				<div class="info-item">
                  <div class="info-item-label"  ids="ids_exchange_Rate">Rate</div>
                  <div class="info-item-value">
                    <span></span>
                    <span id="a2" class="number-val" content='{Binding exchange_ExchangeRate mode=2}'>1.15</span>
                  </div>
                </div>
                <div class="info-line">
                </div>
                <div class="info-item">
                  <div class="info-item-label"  ids="ids_exchange_CashOutAmount">CashOut Amount</div>
                  <div class="info-item-value">
                    <span content='{Binding exchange_HomeCurrency  mode=2}'>€</span>
                    <span class="number-val" content='{Binding exchange_CashOutAmount mode=2}'>200.00</span>
                  </div>
                </div>
              </div>
            </div>
        <!-- <div class="button-box"> -->
          <!-- <div class="grg-btn grg-cancel" type='button' tag='OnCancel'> -->
            <!-- <img class="icon-img" src="../../images/img_2.4/icon_cancel.png" ids='ids_Btn_cancel' alt="">Cancel -->
          <!-- </div> -->
          
          <!-- <div class="grg-btn grg-confirm" id='OnConfirm' type='button'  tag='OnConfirm'> -->
            <!-- <img v-if="signPic_base64" class="icon-img" src="../../images/img_2.4/icon-ok.png" alt=""> -->
            <!-- <img v-else class="icon-img" src="../../images/img_2.4/icon-ok-blue.png" ids='ids_Btn_confirm' alt="">Confirm -->
          <!-- </div> -->
        <!-- </div> -->
      </div>
    </div>
  </div>
</body>

</html>
<script>
  var app = new Base({
    i18n: i18n,
    data: {
      signPic_base64: '',
    },
    methods: {
      clear: function () {
        this.signPic_base64 = ''
      }
    },
    computed: {},
    mounted: function () {}
  }).$mount('#app')
</script>
