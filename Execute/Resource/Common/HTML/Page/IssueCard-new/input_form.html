<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script src="../../js/vue.min.js"></script>
  <script src="../../js/grg-ui.min.js"></script>
  <script src="../../js/vue-i18n.js"></script>
  <script src="../../js/jquery-3.7.0.js"></script>	<script src="../../js/class/layer/layer.js"></script>	<script src="../../js/index.js"></script>
  <script src="../../js/coreScript.js"></script>
  <script src="../../js/ibank.js"></script>
  <link rel="stylesheet" href="../../css/grg-ui.min.css">
  <link rel="stylesheet" href="../../css/animate.grg.css">
  <link rel="stylesheet" href="../../css/ibank.css">
  <style>
    .grg-main {
      display: flex;
      justify-content: space-between;
    }

    .open-card-right-box {
      visibility: hidden;
    }

    .g-form {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      color: #231815;
      margin-top: 30px;
    }

    .g-form-item {
      width: 48.5%;
      padding-bottom: 20px !important;
    }

    .g-form .g-form-item-label {
      color: #231815;
      font-size: 28px;
      font-family: 'Alibaba Sans';
    }

    .g-input {
      background: #e9f0ff;
      border-radius: 10px;
      color: #231815;
      font-size: 24px;
      font-family: 'Alibaba Sans';
      border: none;
    }

    .g-radio .g-radio-circle {
      border-color: #666;
    }

    .g-radio-checked .g-radio-circle {
      border-color: #1890ff;
    }

    .custom-icon {
      display: inline-block;
      background-repeat: no-repeat;
      background-position: 50% 50%;
    }

    .name-icon {
      background-image: url('../../images/img_2.4/form_icon/name-icon.png');
    }

    .birth-date-icon {
      background-image: url('../../images/img_2.4/form_icon/birth-date-icon.png');
    }

    .nation-icon {
      background-image: url('../../images/img_2.4/form_icon/nation-icon.png');
    }

    .passport-icon {
      background-image: url('../../images/img_2.4/form_icon/passport-no-icon.png');
    }

    .expire-icon {
      background-image: url('../../images/img_2.4/form_icon/expire-icon.png');
    }

    .phone-icon {
      background-image: url('../../images/img_2.4/form_icon/phone-icon.png');
    }

    .email-icon {
      background-image: url('../../images/img_2.4/form_icon/email-icon.png');
    }

    .address-icon {
      background-image: url('../../images/img_2.4/form_icon/address-icon.png');
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="grg-header" class="grg-header">
    </div>
    <div id="grg-main" class="grg-main">
      <div class="count-down">
        <div class="count-down-2" id="Counter" type="countdown" content="{Binding Count}"></div>
      </div>
      <div class="step-box">
        <div v-for="(item, index) in stepList" class="step-item">
          <div class="step-left">
            <div
              :class='[item.status == "finish" ? "step-circle-finish" : "step-circle", item.status == "active" ? "step-circle-active" : "step-circle"]'>
              <img v-if="item.status == 'finish'" src="../../images/img_2.4/gou.png" alt="">
              <span v-else>{{ index + 1 }}</span>
            </div>
            <div :class='[item.status == "finish" ? "step-line": "step-dotted-line"]'>
              <img class="line-arrows" v-if='item.status != "finish"' src="../../images/img_2.4/line-arrows.png" alt="">
            </div>
          </div>
          <div
            :class='[item.status == "finish" ? "step-right-finish" : "step-right", item.status == "active" ? "step-right-active" : "step-right"]':ids="item.ids">
            {{ item.title }}</div>
        </div>
      </div>
      <div class="open-card-right-box animate_grg_fadeInRight">
        <div class="title" ids="ids_opac_putpassport">Please Input Your Personal Information</div>
        <div class="form-box">
          <g-form :model="formModel" ref="form" :rules="ruleValidate" label-position='top'>
            <g-form-item label="Name" prop="name" ids='ids_opac_name'>
              <g-input v-model="formModel.name" prefix="custom-icon name-icon"></g-input>
            </g-form-item>
            <g-form-item label="Gender" prop="gender" ids='ids_opac_gender'>
              <g-radio-group v-model="formModel.gender">
                <g-radio value="M"><span ids="ids_Common_Male">Male</span></g-radio>
                <g-radio value="F"><span ids="ids_Common_Female">Female</span></g-radio>
              </g-radio-group>
            </g-form-item>
            <g-form-item label="Birth Date" prop="birthDate" ids='ids_opac_birth'>
              <g-input v-model="formModel.birthDate" type='date' prefix="custom-icon birth-date-icon">
                <g-button slot='cancel-btn' round color='info' ids='ids_Btn_cancel'>Cancel</g-button>
                <g-button slot='confirm-btn' round transparent ids='ids_Btn_confirm'>Confirm</g-button>
              </g-input>
            </g-form-item>
            <g-form-item label="Nation" prop="nation" ids='ids_opac_nation'>
              <g-input v-model="formModel.nation" prefix="custom-icon nation-icon"></g-input>
            </g-form-item>
            <g-form-item label="Passport No" prop="passportNo" ids='ids_opac_passportNo'>
              <g-input v-model="formModel.passportNo" prefix="custom-icon passport-icon"></g-input>
            </g-form-item>
            <g-form-item label="Expire" prop="expire" ids='ids_opac_expire'>
              <g-input v-model="formModel.expire" type='date' prefix="custom-icon expire-icon"></g-input>
            </g-form-item>
            <g-form-item label="Phone No" prop="phoneNum" ids='ids_opac_phone'>
              <g-input type='number' v-model="formModel.phoneNum" prefix="custom-icon phone-icon"></g-input>
            </g-form-item>
            <g-form-item label="Email" prop="email" ids='ids_opac_email'>
              <g-input v-model="formModel.email" type='email' prefix="custom-icon email-icon"></g-input>
            </g-form-item>
            <g-form-item label="Address" prop="address" style="width: 100%;" ids='ids_opac_address'>
              <g-input v-model="formModel.address" prefix="custom-icon address-icon"></g-input>
            </g-form-item>
          </g-form>
          <input type="text" hidden id='formData' v-model='formData' content='{Binding FormData mode=2}'>
        </div>
        <div class="button-box">
          <div class="grg-btn grg-cancel" id='OnCancel' tag='OnCancel' type='button' ids="ids_Btn_cancel">
            <img class="icon-img" src="../../images/img_2.4/icon-cancel.png" alt="" >Cancel
          </div>
          <div :class='["grg-btn", aaa == true ? "grg-confirm" : "grg-cancel"]' :type='aaa == true ? "button" : ""' tag='OnConfirm' @click="handleSubmit" ids="ids_Btn_confirm">
            <img class="icon-img" src="../../images/img_2.4/icon-ok.png" alt="" >Confirm
          </div>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
<script>
  var app = new Base({
    i18n: i18n,
    data: {
      formModel: {
        name: '',
        gender: '',
        birthDate: '',
        nation: '',
        passportNo: '',
        expire: '',
        phoneNum: '',
        email: '',
        address: ''
      },
      stepList: [{
          status: 'finish',
          title: 'Scan Passport',
		  ids:"ids_Common_ScanPassport"
        },
        {
          status: 'active',
          title: 'Customer Info',
		  ids:"ids_Common_CustomerInfo"
        },
        {
          status: 'unFinish',
          title: 'Sign',
		  ids:"ids_Common_Sign"
        },
        {
          status: 'unFinish',
          title: 'Print Form',
		  ids:"ids_Common_PrintForm"
        },
        {
          status: 'unFinish',
          title: 'Scan Form',
		  ids:"ids_Common_ScanForm"
        },
        {
          status: 'unFinish',
          title: 'Printing Card',
		  ids:"ids_Common_PrintingCard"
        },
        {
          status: 'unFinish',
          title: 'User Set Password',
		  ids:"ids_Common_SetPassword"
        },
        {
          status: 'unFinish',
          title: 'Take Card',
		  ids:"ids_Common_TakeCard"
        },
        {
          status: 'unFinish',
          title: 'Print Receipt',
		  ids:"ids_Common_PrintReceipt"
        },
      ],
	  aaa: false,
    },
    methods: {
      calRootFontSize: function () {
        const html = document.getElementsByTagName('html')[0]
        const pageWidth = html.clientWidth
        const pageHeight = html.clientHeight
        if (pageWidth < pageHeight) {
          html.style.fontSize = pageWidth / 10 + 'px'
        } else {
          html.style.fontSize = pageHeight / 10 + 'px'
        }
      },
      handleSubmit: function () {
        this.$refs.form.validate(function (valid) {
          if (valid) {
			this.aaa = true;
            goto('OnConfirm')
          }
		  else {
			this.aaa = false;
		  }
        }.bind(this))
      },
      handleReset: function () {
        this.$refs.form.resetFields();
      }
    },
    computed: {
      ruleValidate: function () {
        return {
          name: [{
            required: true,
            message: this.$t('createAccount.name'),
            trigger: 'change'
          }],
          birthDate: [{
            required: true,
            message: this.$t('createAccount.birthdate'),
            trigger: 'change'
          }],
          gender: [{
            required: true,
            message: this.$t('createAccount.gender'),
            trigger: 'change'
          }],
          nation: [{
            required: true,
            message: this.$t('createAccount.nation'),
            trigger: 'change'
          }],
          email: [{
            type: 'email',
            message: this.$t('createAccount.email'),
            trigger: 'change'
          }],
          phoneNum: [{
            message: this.$t('createAccount.phoneNum'),
            trigger: 'change',
            pattern: /^[0-9]{6,}$/
          }],
        }
      },
      formData: {
        set: function (v) {
          v ? this.formModel = Object.assign(this.formModel, JSON.parse(v)) : {}
        },
        get: function () {
          return JSON.stringify(this.formModel)
        }
      }
    },
    mounted: function () {
      this.calRootFontSize()
      var _this = this
      window.onload = function () {
        var initData = document.querySelector('#formData').value
        initData ? _this.formData = initData : ''
        changeValueListener(document.querySelector('#formData'), function (val) {
          _this.formData = val
        })
        //countDown();
      }
    }
  }).$mount('#app')
</script>
