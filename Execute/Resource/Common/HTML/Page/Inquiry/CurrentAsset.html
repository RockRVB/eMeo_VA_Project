<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
		<title>资产状况</title>
		 <link rel="stylesheet" type="text/css" href="../../css/CN.css" replace="1" />
		<script src="../../js/require.js" type="text/javascript" charset="utf-8" data-main="../../js/main" async="true"></script>
	</head>
	<body class="all_bg">
		<header class="index_top clear">
			<div class="logo"></div>
			<div class="index_top_title">
				<div class="count_down_time" style="display:none" id="Counter" type="countdown" content="{Binding Count}" visible="{Binding CouterVisible}">10</div>
			</div>
		</header>
		<div class="ibank_container">
			<div class="business_container">
				<div class="transaction_result">
					<div class="business_title" ids="IDS_PropertySituation">当前账户资产状况</div>
					<div class="transaction_res_contain" >
						<div  ids="IDS_AccountBalance" style="display:inline" >账户余额：</div>
						<span id="AccountBalance" type="textblock" content="{Binding AccountBalance}" style="display:inline">30,0000.00</span>
						<div  ids="IDS_Currency"  style="display:inline">元</div>
					</div>
					<div class="transaction_res_contain" >
						<div  ids="IDS_AvailableBalance" style="display:inline" >今日可用余额：</div>
						<span id="AvailableBalance" type="textblock" content="{Binding AvailableBalance}" style="display:inline">10,0000.00</span>
						<div  ids="IDS_Currency"  style="display:inline">元</div>
					</div>
				</div>
			</div>
			<div class="button_container">
				<div id="F1" type="Button" tag="OnOtherBusiness" class="cancel_button" ids="IDS_OtherBusiness">其他业务</div>
				<div id="F2" type="Button" tag="OnDetail" class="enter_button" ids="IDS_TransactionDetails">交易明细</div>
			</div>
		</div>
	</body>
</html>
