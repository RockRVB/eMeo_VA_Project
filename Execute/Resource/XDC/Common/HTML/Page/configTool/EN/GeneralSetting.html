<script type="text/javascript">
function show()
{

var p1=document.getElementById("SelectData");
var p2=document.getElementById("NumberNDC");
var p3=document.getElementById("NumberDDC");
var p4=document.getElementById("Protocol");

if(1 == p4.value)
{
  p2.style.display="none";
  if(p3.value.toString().length=="9")
  {
    p1.selectedIndex=0;
    p3.disabled=false; 
  }
  else
  {
    p1.selectedIndex=1; 
    p3.disabled=true;
  }
}
if(0 == p4.value)
{
  p3.style.display="none";
  if(p2.value.toString().length=="9")
  {
    p1.selectedIndex=0;
    p2.disabled=false; 
  }
  else
  {
    p1.selectedIndex=1; 
    p2.disabled=true;
  }
}

}

function show2()
{
var p1=document.getElementById("SelectData");
var p2=document.getElementById("NumberNDC");
var p3=document.getElementById("NumberDDC");
var p4=document.getElementById("Protocol");

if(1 == p4.value)
{
 if(p1.selectedIndex==0)
 {
  p3.disabled=false;
 }
 else
 {  
  p3.disabled=true; 
 }
}
if(0 == p4.value)
{
 if(p1.selectedIndex==0)
 {
  p2.disabled=false;
 }
 else
 {  
  p2.disabled=true; 
 }
}
}

function CalculateLUNO()
{
var p0=document.getElementById("SelectData");
var p2=document.getElementById("NumberNDC");
var p3=document.getElementById("NumberDDC");
var p4=document.getElementById("Protocol");

if(p0.selectedIndex==1)
{
 if(0 == p4.value)
 {
  p2.value="";
 }
 if(1 == p4.value)
 {
  p3.value="";
 }
}

}
</script>
