<!--왠숭츱츰방橙槨Input+잚謹+埼뵀샀Select+잚謹+埼뵀-->
var string;
var obj;
var string1;
function Actived(string)
{

	var p0=string;
	var p1=document.getElementById('Select'+p0+1);
	var p2=document.getElementById('Input'+p0+2);
	var p3=document.getElementById('Select'+p0+2);
	var p4=document.getElementById(p0);

	if(p4.checked)
	{
		p1.disabled=false;
		p2.disabled=false;
		p3.disabled=false;
		p3.selectedIndex=0;
	}
	else
	{
		p1.disabled=true;
		p2.disabled=true;
		p3.disabled=true;
		p3.selectedIndex=1;
	}
}

<!--女충속潼，곬땍충띨，왠齡角뤠零뿍-->
function Load()
{
for(var i=1;i<=8;i++)
{
  var p1=document.getElementById('Input'+i+1);
  var p2=document.getElementById('Select'+i+2);
  var p3=document.getElementById('Select'+i+1);
  var p4=document.getElementById('Input'+i+2);
  var p5=document.getElementById(i);

  
  <!--삿혤낟튿충띨，痰;롸몇-->
var p6=document.getElementById("InputCurrencyList");
var list=new Array();
list=p6.value.split(";");
for(j=0;j<=list.length;j++)
{
  p3.options.add(new Option(list[j]));

  if(p1.value==list[j]) p3.selectedIndex=j;
 
}
 if(p2.selectedIndex==0)
  {
    p3.disabled=false;
    p4.disabled=false;
    p2.disabled=false;
    p5.checked=true;
  }
}
}
function BindCurrency(obj,string1)
{
  var p1=document.getElementById('Input'+string1+1);
  p1.value=obj.options[obj.selectedIndex].text;
}
